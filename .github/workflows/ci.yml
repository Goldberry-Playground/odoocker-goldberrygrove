name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-python:
    name: Lint Python (custom addons)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - name: Ruff check
        run: |
          if find odoo/custom-addons/ -name "*.py" 2>/dev/null | grep -q .; then
            ruff check odoo/custom-addons/ --select E,F,I --line-length 120
          else
            echo "No Python files in custom-addons/, skipping"
          fi
      - name: Ruff format check
        run: |
          if find odoo/custom-addons/ -name "*.py" 2>/dev/null | grep -q .; then
            ruff format --check odoo/custom-addons/ --line-length 120
          else
            echo "No Python files in custom-addons/, skipping"
          fi

  validate-compose:
    name: Validate docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub env files
        run: |
          [ -f .env.example ] && cp .env.example .env
          [ -f .env.grove.example ] && cp .env.grove.example .env.grove || true

      - name: Validate base + local overlay
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.override.local.yml \
            --profile odoo --profile postgres \
            config --quiet

      - name: Validate base + local + grove overlay
        run: |
          if [ -f docker-compose.override.grove.yml ]; then
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.override.local.yml \
              -f docker-compose.override.grove.yml \
              --env-file .env --env-file .env.grove \
              --profile odoo --profile postgres --profile ghost \
              config --quiet
          fi

      - name: Validate base + production overlay
        run: |
          if [ -f docker-compose.override.production.yml ]; then
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.override.production.yml \
              --profile odoo --profile postgres \
              config --quiet
          fi

      - name: Validate base + sandbox overlay
        run: |
          if [ -f docker-compose.override.sandbox.yml ]; then
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.override.sandbox.yml \
              --profile odoo --profile postgres \
              config --quiet
          fi

  validate-nginx-syntax:
    name: Validate nginx textual syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Brace balance + reserved-word smell test
        run: |
          python3 - <<'PY'
          import pathlib, re, sys
          fail = False
          for conf in pathlib.Path("nginx").glob("*.conf"):
              text = conf.read_text()
              # Strip comments before counting braces.
              stripped = re.sub(r"#[^\n]*", "", text)
              opens = stripped.count("{")
              closes = stripped.count("}")
              if opens != closes:
                  print(f"  {conf}: FAIL — unbalanced braces ({opens} opens, {closes} closes)")
                  fail = True
                  continue

              print(f"  {conf}: ok ({opens} blocks)")
          if fail:
              sys.exit(1)
          PY

      # The real syntax check — including upstream resolution — happens in
      # stack-smoke-test below, where nginx starts with its actual peers up.

  stack-smoke-test:
    name: Backend stack smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub env files
        run: |
          cp .env.example .env
          sed -i 's/^APP_ENV=.*/APP_ENV=local/' .env || true
          [ -f .env.grove.example ] && cp .env.grove.example .env.grove || true

      - name: Start Postgres + Odoo
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.override.local.yml \
            --profile odoo --profile postgres \
            up -d

      - name: Wait for Odoo to respond
        run: |
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:8069/web/database/manager 2>/dev/null \
               || curl -fsS -o /dev/null http://localhost:8069/web/login 2>/dev/null; then
              echo "Odoo responding after ${i} polls"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Odoo never came online"
          docker compose logs odoo postgres
          exit 1

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.override.local.yml \
            --profile odoo --profile postgres \
            down -v
