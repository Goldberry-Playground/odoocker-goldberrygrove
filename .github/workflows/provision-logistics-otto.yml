name: Provision Logistics Otto (Odoo)

###############################################################################
# GOL-89 — self-serve provisioning of the least-privilege `logistics-otto`
# Odoo user + its API key, run where access already exists (the droplet), so
# no admin credential ever leaves the vault/the droplet and no operator is in
# the loop. CEO (Rick) approved option (b) on GOL-62.
#
# WHAT IT DOES (idempotent, re-runnable)
#   1. SSH to the target Odoo droplet.
#   2. Inside `docker compose exec -T odoo odoo shell` (superuser `env`, full DB
#      context — NO admin login/API key needed; see the scripts' headers for
#      why XML-RPC can't be used on these droplets):
#        a. provision_logistics_user_shell.py — create/ensure `logistics-otto`
#           with ONLY Inventory + Purchase + Sales + UoM groups.
#        b. mint_logistics_key.py — mint the user's `rpc`-scoped API key
#           (revokes any prior same-name key first → clean rotation).
#   3. Mask the minted key, write it to 1Password as ODOO_API_KEY (live only).
#
#   Otto's runtime env (ODOO_URL / ODOO_DB / ODOO_LOGIN / ODOO_API_KEY) is
#   injected SEPARATELY, Paperclip-side, by DevOps-Terra — the GH runner has no
#   route to the Paperclip control plane. Key stays a 1Password reference in
#   Otto's env; the plaintext never touches AGENTS.md/adapter config/logs/
#   artifacts/any comment. See GOL-89 for the injection step + odoo_client.py
#   check verification.
#
# ── Why 1Password, and why its OWN vault (GOL-237 / ADR-0001 Phase 3.4) ─────
#   This step used to write to Infisical via a write-scoped OIDC identity. It
#   was the last live Infisical reference in CI and gated the whole Infisical
#   teardown (GOL-231) — so it moved to 1Password with the rest.
#
#   `1password/load-secrets-action` is READ-only, so this is not an action
#   swap: it needs the `op` CLI and a WRITE-capable service-account token.
#   That token is deliberately NOT `OP_CI_SA_TOKEN` (read-only, Grove Prod) and
#   deliberately NOT a write grant on Grove Prod — a write SA on Grove Prod
#   would let any CI run overwrite ANY prod secret, which is strictly worse
#   than the Infisical per-path write scope it replaced. Instead the token is
#   scoped to a dedicated vault (`Grove CI Writeback`) whose ONLY contents are
#   the Otto keys this workflow itself mints. Blast radius of a leaked token =
#   the key CI just minted, and a mis-write is repaired by re-running this
#   workflow. See docs/RUNBOOK-otto-key-writeback.md for the vault + token
#   setup (a 1Password-admin console action; not self-servable from CI).
#
# DISPATCHABILITY
#   `workflow_dispatch` only activates once this file is on the DEFAULT branch
#   (main). It is on main as of PR #180 — but the workflow has NEVER been run
#   (0 runs as of 2026-07-15) because none of the secrets below are seeded.
#   Every secret-dependent step fails FAST and LOUD rather than half-running.
#
# ── Secrets this workflow needs (per environment) — NONE are seeded yet ─────
#   GH Actions secrets (mirror release.yml's SSH deploy pattern):
#     qa   : QA_SSH_PRIVATE_KEY   (grove-qa-deploy private key), QA_HOST
#     prod : PROD_SSH_PRIVATE_KEY, PROD_HOST
#     NOTE: the repo currently has GROVE_QA_CI_SSH_PRIVATE_KEY, not
#     QA_SSH_PRIVATE_KEY/QA_HOST. Reconcile the names at Otto go-live (GOL-89).
#   1Password (write ODOO_API_KEY):
#     OP_CI_WRITEBACK_SA_TOKEN — service-account token with write_items on the
#     `Grove CI Writeback` vault ONLY. See docs/RUNBOOK-otto-key-writeback.md.
#   Seed status is tracked on GOL-89 (go-live), NOT on GOL-237 — GOL-237 only
#   owns "this file no longer references Infisical", which is satisfied.
###############################################################################

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Odoo environment"
        type: choice
        required: true
        default: qa
        options:
          - qa
          - prod
      dry_run:
        description: "Print the scope preview only — do NOT create the user or mint a key"
        type: boolean
        required: true
        default: true

concurrency:
  # One provisioning run per environment at a time (key mint is a rotation).
  group: provision-logistics-otto-${{ inputs.environment }}
  cancel-in-progress: false

# No id-token: 1Password authenticates with a service-account token, not OIDC.
permissions:
  contents: read

jobs:
  provision:
    name: Provision + mint (${{ inputs.environment }}${{ inputs.dry_run && ' · dry-run' || ' · LIVE' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Write-back target. The vault is constant; the ITEM is per-environment so
      # a qa run and a prod run can never land on each other's key (1Password SA
      # tokens scope per-vault, not per-item — the item split is what keeps the
      # two environments' keys distinct inside the shared writeback vault).
      OP_WRITEBACK_VAULT: Grove CI Writeback
      OP_WRITEBACK_ITEM: otto-${{ inputs.environment == 'prod' && 'prod' || 'qa' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2

      # Resolve per-environment deploy facts. Kept in one place so a new env is
      # a single map entry, not a scatter of `if`s across steps.
      - name: Resolve environment
        id: resolve
        timeout-minutes: 1
        env:
          TARGET: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          if [ "$TARGET" = "prod" ]; then
            echo "deploy_dir=/opt/grove"                                                   >> "$GITHUB_OUTPUT"
            echo "compose_args=-f docker-compose.yml -f docker-compose.override.grove.yml -f docker-compose.override.production.yml" >> "$GITHUB_OUTPUT"
            echo "odoo_url=https://odoo.gatheringatthegrove.com"                            >> "$GITHUB_OUTPUT"
          else
            # qa-app-platform "Level 3" Odoo droplet: single compose file written
            # to /etc/grove/docker-compose.yml by cloud-init; .env alongside it.
            echo "deploy_dir=/etc/grove"                                                    >> "$GITHUB_OUTPUT"
            echo "compose_args=--env-file /etc/grove/.env"                                  >> "$GITHUB_OUTPUT"
            echo "odoo_url=https://odoo.qa.gatheringatthegrove.com"                         >> "$GITHUB_OUTPUT"
          fi

      - name: Load SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        timeout-minutes: 2
        with:
          ssh-private-key: ${{ inputs.environment == 'prod' && secrets.PROD_SSH_PRIVATE_KEY || secrets.QA_SSH_PRIVATE_KEY }}

      - name: Add droplet to known hosts
        timeout-minutes: 1
        env:
          HOST: ${{ inputs.environment == 'prod' && secrets.PROD_HOST || secrets.QA_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      # ── Provision (idempotent) — pipe the shell-context script over ssh into
      # the odoo container's `odoo shell` stdin. DB name is read from the
      # droplet's own .env so we never hardcode it. On dry-run this prints the
      # scope preview and writes nothing.
      - name: Provision logistics-otto user
        id: provision
        timeout-minutes: 5
        env:
          HOST: ${{ inputs.environment == 'prod' && secrets.PROD_HOST || secrets.QA_HOST }}
          DEPLOY_DIR: ${{ steps.resolve.outputs.deploy_dir }}
          COMPOSE_ARGS: ${{ steps.resolve.outputs.compose_args }}
          DRY: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          DRYENV=""
          [ "$DRY" = "true" ] && DRYENV="-e LOGISTICS_DRY_RUN=1"
          ssh -o StrictHostKeyChecking=yes "root@${HOST}" \
            "set -a; . ${DEPLOY_DIR}/.env; set +a; \
             cd ${DEPLOY_DIR} && docker compose ${COMPOSE_ARGS} exec -T ${DRYENV} \
               odoo odoo shell -d \"\$DB_NAME\" --no-http --logfile=/dev/null" \
            < skills/odoo-logistics/scripts/provision_logistics_user_shell.py \
            | tee provision.out
          echo "----- provision output (scope preview / uid; no secrets) -----"
          cat provision.out

      # ── Mint the API key (live runs only). Output is captured, masked
      # immediately, and never echoed. Idempotent: prior same-name key revoked.
      - name: Mint logistics-otto API key
        id: mint
        if: ${{ inputs.dry_run == false }}
        timeout-minutes: 5
        env:
          HOST: ${{ inputs.environment == 'prod' && secrets.PROD_HOST || secrets.QA_HOST }}
          DEPLOY_DIR: ${{ steps.resolve.outputs.deploy_dir }}
          COMPOSE_ARGS: ${{ steps.resolve.outputs.compose_args }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes "root@${HOST}" \
            "set -a; . ${DEPLOY_DIR}/.env; set +a; \
             cd ${DEPLOY_DIR} && docker compose ${COMPOSE_ARGS} exec -T \
               odoo odoo shell -d \"\$DB_NAME\" --no-http --logfile=/dev/null" \
            < skills/odoo-logistics/scripts/mint_logistics_key.py \
            > mint.out 2> mint.err || { echo "::error::mint failed"; cat mint.err; exit 1; }
          KEY="$(sed -n '/----BEGIN LOGISTICS_OTTO_API_KEY----/{n;p;}' mint.out)"
          if [ -z "$KEY" ]; then
            echo "::error::no key parsed from mint output"; sed -n '/BEGIN/,/END/d;p' mint.err; exit 1
          fi
          echo "::add-mask::$KEY"
          # Hand off to the next step via env file (masked value never printed).
          printf 'ODOO_OTTO_KEY=%s\n' "$KEY" >> "$GITHUB_ENV"
          rm -f mint.out
          echo "key minted + masked (value withheld from logs)"

      # `op` CLI — needed because load-secrets-action is read-only and this is
      # the one CI step in the repo that WRITES a secret.
      - name: Install 1Password CLI
        if: ${{ inputs.dry_run == false }}
        uses: 1password/install-cli-action@v4
        timeout-minutes: 2

      # Write the key to 1Password (live runs only). Requires a write-scoped SA
      # token on the dedicated `Grove CI Writeback` vault — see header. This is
      # the ONLY place the plaintext touches a durable store, and it goes
      # straight into the secrets manager.
      #
      # Idempotent: edit the item if it exists, create it if it doesn't. Both
      # converge on "the item holds the key this run just minted", so a re-run
      # after a partial failure is safe.
      - name: Store ODOO_API_KEY in 1Password
        if: ${{ inputs.dry_run == false }}
        timeout-minutes: 3
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_CI_WRITEBACK_SA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]; then
            echo "::error::OP_CI_WRITEBACK_SA_TOKEN not set — cannot write ODOO_API_KEY. A key was minted this run and will be DISCARDED; re-run after seeding the token (docs/RUNBOOK-otto-key-writeback.md / GOL-89)."
            exit 1
          fi
          # Fail before minting-side work is wasted if the vault isn't reachable.
          if ! op vault get "$OP_WRITEBACK_VAULT" >/dev/null 2>&1; then
            echo "::error::vault '${OP_WRITEBACK_VAULT}' not reachable with OP_CI_WRITEBACK_SA_TOKEN. Create it + grant the SA write_items (docs/RUNBOOK-otto-key-writeback.md)."
            exit 1
          fi
          if op item get "$OP_WRITEBACK_ITEM" --vault "$OP_WRITEBACK_VAULT" >/dev/null 2>&1; then
            op item edit "$OP_WRITEBACK_ITEM" --vault "$OP_WRITEBACK_VAULT" \
              "ODOO_API_KEY[password]=${ODOO_OTTO_KEY}" >/dev/null
            echo "ODOO_API_KEY updated: op://${OP_WRITEBACK_VAULT}/${OP_WRITEBACK_ITEM}/ODOO_API_KEY"
          else
            op item create --category="API Credential" \
              --title "$OP_WRITEBACK_ITEM" --vault "$OP_WRITEBACK_VAULT" \
              "ODOO_API_KEY[password]=${ODOO_OTTO_KEY}" >/dev/null
            echo "ODOO_API_KEY created: op://${OP_WRITEBACK_VAULT}/${OP_WRITEBACK_ITEM}/ODOO_API_KEY"
          fi

      - name: Summary
        if: ${{ always() }}
        env:
          TARGET: ${{ inputs.environment }}
          DRY: ${{ inputs.dry_run }}
          ODOO_URL: ${{ steps.resolve.outputs.odoo_url }}
        run: |
          {
            echo "### Provision Logistics Otto — ${TARGET}"
            echo ""
            echo "- mode: $([ "$DRY" = "true" ] && echo 'DRY-RUN (scope preview only)' || echo 'LIVE')"
            echo "- ODOO_URL: ${ODOO_URL}"
            echo "- login: logistics-otto  (Inventory + Purchase + Sales + UoM only)"
            if [ "$DRY" != "true" ]; then
              echo "- key written to: \`op://${OP_WRITEBACK_VAULT}/${OP_WRITEBACK_ITEM}/ODOO_API_KEY\`"
            fi
            echo ""
            echo "Next (live): DevOps-Terra injects ODOO_URL/ODOO_DB/ODOO_LOGIN/ODOO_API_KEY"
            echo "into Otto's Paperclip env (1Password ref, not plaintext), then runs"
            echo "\`odoo_client.py check\`. Tracked on GOL-89."
          } >> "$GITHUB_STEP_SUMMARY"
