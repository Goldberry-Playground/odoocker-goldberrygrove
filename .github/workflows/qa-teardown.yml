name: QA Teardown

###############################################################################
# Tears down the QA env via direct DigitalOcean + Cloudflare API calls
# (scripts/qa-teardown-all.sh). DOES NOT use `terraform destroy` because:
#
#   1. The DO provider has a hardcoded 1m destroy-poll timeout that routinely
#      trips on droplet deletes (see 2026-06-24 incident, PR #59 didn't fix).
#   2. TF destroy needs the teardown token to have delete scope on EVERY
#      resource type in state -- including ssh_key + firewall, which the
#      current do_token_teardown lacks. The script-based teardown only
#      destroys the expensive/dynamic resources (droplet + DNS) and leaves
#      SSH keys + firewall idle for the next deploy to reuse.
#
# Triggers:
#   - workflow_dispatch -- manual teardown anytime (requires 'destroy' confirm)
#   - workflow_call -- callable from other workflows (e.g. release.yml on
#     prod-deploy success)
#
# What's destroyed:
#   - All env-qa droplets (via tag query)
#   - The DO domain qa.gatheringatthegrove.com + all child A/CNAME records
#   - Optionally: the Cloudflare NS delegation (--with-cloudflare flag)
#
# What's preserved (intentionally):
#   - SSH keys (grove-qa-admin + grove-qa-deploy) -- long-lived by design
#   - Firewall (grove-qa-fw) -- harmless without droplet attached
#   - Cloudflare NS delegation (unless --with-cloudflare) -- speeds re-deploy
###############################################################################

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm. Tester data on the QA droplet is permanently lost."
        type: string
        required: true
      with_cloudflare:
        description: "Also remove the Cloudflare NS delegation. Slower next re-deploy (5-30m DNS propagation). Only enable if migrating delegation."
        type: boolean
        default: false
  workflow_call:
    inputs:
      with_cloudflare:
        type: boolean
        default: false

permissions: {}

concurrency:
  group: qa-teardown
  cancel-in-progress: false   # let an in-flight teardown finish

jobs:
  qa-teardown:
    name: Destroy QA env
    # Only run when manually dispatched WITH the confirm string (workflow_call
    # invocations skip the confirm guard, since they're already programmatic
    # decisions from another workflow's success path)
    if: github.event_name == 'workflow_call' || github.event.inputs.confirm == 'destroy'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    env:
      # Same Infisical identity as qa-deploy. Fetches DIGITALOCEAN_TOKEN_TEARDOWN
      # (delete-scoped on droplet + domain), CLOUDFLARE_API_TOKEN, and the
      # Discord webhook URL.
      INFISICAL_PROJECT_SLUG: grove-odoocker-qu8p
      INFISICAL_ENV_SLUG: prod
      INFISICAL_IDENTITY_ID: c502a60d-4b37-4e15-9fd7-8186c80c2ad0

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2

      - name: Fetch secrets from Infisical (OIDC)
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        timeout-minutes: 2
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          secret-path: /
          export-type: env

      - name: Map teardown token
        timeout-minutes: 1
        run: |
          if [ -z "${DIGITALOCEAN_TOKEN_TEARDOWN:-}" ]; then
            echo "::error::DIGITALOCEAN_TOKEN_TEARDOWN not in Infisical -- add it before re-running"
            exit 1
          fi
          # The scripts/qa-teardown-*.sh scripts read DIGITALOCEAN_TOKEN.
          # Map the teardown-scoped token to that name.
          echo "DIGITALOCEAN_TOKEN=$DIGITALOCEAN_TOKEN_TEARDOWN" >> "$GITHUB_ENV"

      - name: Run teardown (droplet + DNS via direct API)
        timeout-minutes: 8
        env:
          WITH_CF: ${{ inputs.with_cloudflare || github.event.inputs.with_cloudflare }}
        run: |
          args=()
          [ "$WITH_CF" = "true" ] && args+=("--with-cloudflare")
          bash scripts/qa-teardown-all.sh "${args[@]}"

      - name: Post Discord notification
        if: always()
        timeout-minutes: 1
        env:
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$STATUS" = "success" ]; then COLOR=10070709; ICON="🪦"; else COLOR=15158332; ICON="🚨"; fi
          PAYLOAD=$(jq -n \
            --arg title "$ICON QA Teardown -- $STATUS" \
            --arg description "Initiated by @$ACTOR. QA env destroyed; tester data lost." \
            --arg run_url "$RUN_URL" \
            --argjson color "$COLOR" \
            '{
              username: "🧪 Grove QA",
              embeds: [{
                title: $title,
                description: $description,
                url: $run_url,
                color: $color
              }]
            }')
          # Audit fix 2026-06-29: gate the curl on a non-empty webhook URL.
          # If Infisical fetch silently produced an empty string (auth glitch,
          # missing secret, etc), `curl ... ""` would burn a real round-trip
          # to an empty URL just to be swallowed by `|| true`.
          if [ -n "${DISCORD_OPS_WEBHOOK_URL:-}" ]; then
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "$PAYLOAD" "$DISCORD_OPS_WEBHOOK_URL" || \
              echo "::warning::Discord post failed (URL was set) — teardown ran regardless"
          else
            echo "::warning::DISCORD_OPS_WEBHOOK_URL is empty — skipping Discord post"
          fi
