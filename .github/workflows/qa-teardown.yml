name: QA Teardown

###############################################################################
# Tears down the QA env. Runs `make qa-destroy CONFIRM=yes` against the
# infra/terraform/environments/qa/ TF env.
#
# Triggers:
#   - workflow_dispatch — manual teardown anytime
#   - workflow_run on QA Deploy success — DOES NOT run automatically; see
#     below. The prod release workflow (when M4 exists) will invoke teardown
#     via gh CLI / repository_dispatch as part of its successful-deploy step.
#
# Why no auto-trigger on push to main (yet): release.yml doesn't actually do a
# prod deploy yet (M4 not shipped). When release.yml is wired to a real prod
# deploy, it'll dispatch this workflow at the end via:
#   gh workflow run qa-teardown.yml --repo Goldberry-Playground/odoocker-goldberrygrove
###############################################################################

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm. Tester data on the QA droplet is permanently lost."
        type: string
        required: true

permissions: {}

concurrency:
  group: qa-teardown
  cancel-in-progress: false   # let an in-flight teardown finish

jobs:
  qa-teardown:
    name: Destroy QA env
    if: github.event.inputs.confirm == 'destroy'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    env:
      # Same identity as qa-deploy.yml — see that workflow for the full
      # assignment block. (gh-oidc-odoocker-shared, c502a60d-...)
      INFISICAL_PROJECT_SLUG: grove-odoocker-qu8p
      INFISICAL_ENV_SLUG: prod
      INFISICAL_IDENTITY_ID: c502a60d-4b37-4e15-9fd7-8186c80c2ad0

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Fetch secrets from Infisical (OIDC)
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          secret-path: /
          export-type: env

      - name: Map Infisical-fetched secrets to TF / S3 envs
        run: |
          {
            echo "TF_VAR_do_token=$DIGITALOCEAN_TOKEN"
            echo "TF_VAR_cloudflare_api_token=$CLOUDFLARE_API_TOKEN"
            echo "AWS_ACCESS_KEY_ID=$SPACES_ACCESS_KEY_ID"
            echo "AWS_SECRET_ACCESS_KEY=$SPACES_SECRET_ACCESS_KEY"
          } >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "~1.9"

      - name: Stub SSH key for TF (destroy still needs the var to evaluate)
        # The TF env reads ssh_public_key_path even on destroy. Stub a key
        # so file() doesn't fail. The droplet is being destroyed anyway.
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/grove-qa-deploy -N "" -C "grove-qa-teardown"

      - name: Terraform init
        working-directory: infra/terraform/environments/qa
        run: |
          cp backend.hcl.example backend.hcl
          terraform init -backend-config=backend.hcl -input=false

      - name: Terraform destroy
        working-directory: infra/terraform/environments/qa
        run: terraform destroy -input=false -auto-approve

      - name: Post Discord notification
        if: always()
        env:
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$STATUS" = "success" ]; then COLOR=10070709; ICON="🪦"; else COLOR=15158332; ICON="🚨"; fi
          PAYLOAD=$(jq -n \
            --arg title "$ICON QA Teardown — $STATUS" \
            --arg description "Initiated by @$ACTOR. QA env destroyed; tester data lost." \
            --arg run_url "$RUN_URL" \
            --argjson color "$COLOR" \
            '{
              username: "🧪 Grove QA",
              embeds: [{
                title: $title,
                description: $description,
                url: $run_url,
                color: $color
              }]
            }')
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_OPS_WEBHOOK_URL" || true
