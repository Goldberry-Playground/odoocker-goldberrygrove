name: QA Deploy

###############################################################################
# Drives Josh's dev cycle: push to `qa` branch → auto-provision QA env →
# post URLs to Discord. Real humans then test at the URLs.
#
# Calls `make qa-apply` which runs the TF env at
# infra/terraform/environments/qa/. The TF env is self-contained — Cloudflare
# delegation + DO droplet + DNS records + firewall, all in one apply.
#
# First-push behavior: ~10-30 min from workflow start to live TLS URLs
# (Cloudflare NS propagation is the long pole).
# Subsequent pushes: ~30 sec if only droplet image tag changed; ~5 min if
# droplet needs recreation (taint).
#
# Tied off by qa-teardown.yml on push to `main` (prod cutover).
###############################################################################

on:
  push:
    branches: [qa]
  workflow_dispatch:
    inputs:
      taint_droplet:
        description: "Recreate the droplet (force cloud-init re-run). Use when image tags changed or droplet got into a bad state."
        type: boolean
        default: false
      use_staging_acme:
        description: "Use LE STAGING for cert issuance (browser warnings but no rate limits). Use when iterating heavily; flip OFF for a real cert. Default false = prod."
        type: boolean
        default: false

permissions: {}

concurrency:
  # One QA deploy at a time per branch — cancel previous if a new push comes
  # in while the prior one is still applying.
  group: qa-deploy
  cancel-in-progress: true

jobs:
  qa-deploy:
    name: Provision QA env + post URLs
    runs-on: ubuntu-latest
    timeout-minutes: 40   # generous: first apply with cloud-init can take 30+ min

    permissions:
      contents: read       # checkout
      id-token: write      # OIDC token for Infisical exchange

    env:
      # ── Infisical identity assignment ──────────────────────────────────
      # Identity:   gh-oidc-odoocker-shared (UUID c502a60d-4b37-4e15-9fd7-8186c80c2ad0)
      # Project:    grove-odoocker (slug grove-odoocker-qu8p)
      # Trust:      repository claim only (any branch on odoocker repo)
      # Co-tenants: terraform-drift, sandbox-reaper, sandbox-deploy, docker-odoo
      #             — see infra/terraform/environments/infisical-identities/README.md
      #
      # Fetched via Infisical OIDC (all under secret-path: /):
      #   DIGITALOCEAN_TOKEN              -- for the qa TF apply (deploy-scoped: read+create only)
      #   CLOUDFLARE_API_TOKEN            -- for Cloudflare NS delegation TF resources
      #   DISCORD_OPS_WEBHOOK_URL         -- for posting the URL list
      #   SPACES_ACCESS_KEY_ID            -- for the S3 backend (DO Spaces)
      #   SPACES_SECRET_ACCESS_KEY        -- for the S3 backend
      #   GROVE_QA_CI_SSH_PRIVATE_KEY     -- long-lived CI SSH key (PR #63); written
      #                                      to ~/.ssh/grove-qa-deploy on the runner
      # The teardown-scoped DIGITALOCEAN_TOKEN_TEARDOWN is also in the env but
      # NOT used by this workflow -- only qa-teardown.yml + qa-ttl-sweeper.yml
      # reference it.
      INFISICAL_PROJECT_SLUG: grove-odoocker-qu8p
      INFISICAL_ENV_SLUG: prod
      INFISICAL_IDENTITY_ID: c502a60d-4b37-4e15-9fd7-8186c80c2ad0

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2

      - name: Fetch secrets from Infisical (OIDC)
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        timeout-minutes: 2
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          secret-path: /
          export-type: env

      - name: Map Infisical-fetched secrets to TF / S3 envs
        timeout-minutes: 1
        run: |
          {
            echo "TF_VAR_do_token=$DIGITALOCEAN_TOKEN"
            echo "TF_VAR_cloudflare_api_token=$CLOUDFLARE_API_TOKEN"
            echo "AWS_ACCESS_KEY_ID=$SPACES_ACCESS_KEY_ID"
            echo "AWS_SECRET_ACCESS_KEY=$SPACES_SECRET_ACCESS_KEY"
          } >> "$GITHUB_ENV"

      # Fail fast if any of the grove-* images at the requested tags aren't
      # anonymously pullable from GHCR. Catches the "private package" failure
      # that wasted ~20 min on 2026-06-24 before cloud-init's silent death
      # surfaced via the grove-ready sentinel timeout.
      # Fail fast if cloud-init template inputs have non-ASCII bytes.
      # PyYAML rejects these as #x0080 errors; the droplet boots but never
      # runs docker compose. Wasted ~30 min on 2026-06-24 when em-dashes in
      # comments silently broke the YAML parse.
      - name: Pre-flight - verify cloud-init inputs are pure ASCII
        timeout-minutes: 1
        run: bash scripts/check-cloud-init-ascii.sh

      - name: Pre-flight - verify GHCR images pullable
        timeout-minutes: 2
        run: bash scripts/check-ghcr-images.sh

      # Catches the PR #90-class "image built + pushed + pullable, but missing
      # the files our runtime needs" failure. Pulls each image and asserts
      # known invariants about its filesystem + binary behavior. Far cheaper
      # than discovering at sentinel-poll time on the live droplet.
      - name: Pre-flight - verify image shapes (entrypoint, modules, etc.)
        timeout-minutes: 4
        run: bash scripts/check-image-shape.sh

      # Workaround for caddy-dns/digitalocean plugin's TXT cleanup bug:
      # every successful ACME challenge leaves a permanent _acme-challenge
      # TXT in the zone (plugin's delete step fails with strconv.Atoi parse
      # error -- known upstream issue). Accumulate enough and LE rejects
      # subsequent validations with "Incorrect TXT record (and N more)".
      # We hit 17->23 stale TXTs in one night before noticing. Cleanup
      # BEFORE deploy guarantees Caddy starts with a clean slate. Idempotent
      # + fast (single DO API list + per-id DELETEs); safe to run every deploy.
      - name: Pre-flight - cleanup orphan _acme-challenge TXTs
        timeout-minutes: 2
        run: bash scripts/cleanup-acme-txts.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        timeout-minutes: 3
        with:
          terraform_version: "~1.9"

      - name: Materialize CI SSH private key from Infisical
        timeout-minutes: 1
        # Was: ssh-keygen every run -> regenerates the key -> TF planned a
        # REPLACE on the digitalocean_ssh_key resource every run -> deploy
        # token's lack of ssh_key:delete scope returned 403. Wasted hours
        # on 2026-06-24.
        #
        # Now: the CI key is LONG-LIVED. Public key is hardcoded in TF
        # (var.ci_ssh_public_key default). Private key was fetched into the
        # GROVE_QA_CI_SSH_PRIVATE_KEY env var by the Infisical secrets-action
        # step at the top of this job. We just write it to ~/.ssh/grove-qa-deploy
        # so the grove-ready poll later in this workflow can use it.
        #
        # The droplet sees the same SSH key fingerprint across every run, so
        # TF plan never needs a destroy. No more orphan-key cleanup.
        run: |
          if [ -z "${GROVE_QA_CI_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::GROVE_QA_CI_SSH_PRIVATE_KEY not set — the Infisical fetch step likely didn't include it. Verify the secret exists in the grove-odoocker/prod env."
            exit 1
          fi
          mkdir -p ~/.ssh
          # GitHub Actions strips trailing newlines from secrets; OpenSSH
          # requires the key end with one. Use printf + trailing \n to be safe.
          printf '%s\n' "$GROVE_QA_CI_SSH_PRIVATE_KEY" > ~/.ssh/grove-qa-deploy
          chmod 600 ~/.ssh/grove-qa-deploy
          # Sanity-check the key is well-formed (catches secret-mangling on the way through)
          if ! ssh-keygen -y -f ~/.ssh/grove-qa-deploy >/dev/null 2>&1; then
            # Diagnostic info ONLY ON FAILURE — emits length + first-line shape
            # (no key material) so the operator can pin the root cause without
            # re-running with debug logging. Added after the 2026-06-30 01:33 UTC
            # failure printed only "malformed" with zero context.
            len=$(wc -c < ~/.ssh/grove-qa-deploy | tr -d ' ')
            first_line_shape=$(head -1 ~/.ssh/grove-qa-deploy | sed 's/[a-zA-Z0-9+/=]/X/g' | head -c 40)
            last_byte=$(tail -c 1 ~/.ssh/grove-qa-deploy | od -An -c | tr -d ' ')
            echo "::error::CI SSH private key is malformed after writing to disk."
            echo "  Diagnostic (safe -- no key material):"
            echo "    bytes_written    = $len"
            echo "    first_line_shape = '$first_line_shape'  (chars masked as X)"
            echo "    last_byte_repr   = '$last_byte'  (should be '\\n')"
            echo "  Likely causes:"
            echo "    - Infisical returned empty/whitespace-only value (check secret in grove-odoocker/prod env)"
            echo "    - Secret pasted with extra whitespace (probe via op CLI with byte count)"
            echo "    - Key format wrong (must start with -----BEGIN OPENSSH PRIVATE KEY----- AND end with literal \\n)"
            exit 1
          fi

      - name: Terraform init
        timeout-minutes: 5
        working-directory: infra/terraform/environments/qa
        run: |
          cp backend.hcl.example backend.hcl
          terraform init -backend-config=backend.hcl -input=false

      # Taint runs BEFORE plan/apply so the plan reflects the recreate.
      # The old "plan → taint → apply tfplan.binary" sequence failed with
      # "Saved plan is stale" because taint modifies state between the plan
      # snapshot and the apply.
      - name: Optionally taint droplet (workflow_dispatch input)
        if: github.event.inputs.taint_droplet == 'true'
        timeout-minutes: 1
        working-directory: infra/terraform/environments/qa
        run: terraform taint digitalocean_droplet.qa || true

      # Pre-teardown: the DO provider has a hardcoded 1m delete timeout
      # baked in (NOT overridable via timeouts {} block). When TF apply
      # decides to REPLACE the droplet (e.g. user_data changed, which
      # happens any time cloud-init.yaml.tpl or compose YAML changes), the
      # DELETE step routinely exceeds 1m and the whole apply fails. We hit
      # this 4 times tonight (2026-06-26) after PRs #95/#96 + sync-cascade
      # started firing: every main push triggered a fresh apply, every
      # apply hit the delete timeout, every deploy failed.
      #
      # Fix: pre-teardown via the script BEFORE terraform apply. Script is
      # idempotent (exits 0 if no env-qa droplets) and uses the DELETE-
      # scoped token to bypass TF entirely with a generous poll budget.
      # When TF apply then runs, the droplet resource is a CREATE-only
      # operation (no DELETE step = no timeout to hit).
      #
      # Trade-off: this always tears down + recreates the droplet on every
      # qa-deploy. That's actually fine -- PR-A's persistent Caddy /data
      # volume + the long-lived SSH key (PR #63) mean droplet recreation
      # is cheap (~3 min boot, cert from volume = no LE call). Without the
      # pre-teardown we get random failures; with it we get reliable
      # recreates. The recreate cost is much less than the failure cost.
      # Uses DIGITALOCEAN_TOKEN_TEARDOWN (least-privilege: droplet:delete +
      # block_storage:write only). This is the post-2026-06-27-Infisical-
      # reconciliation state -- prior to that the Infisical value was stale/
      # broken (returned 401 in CI even though the 1Password copy worked).
      # See PR #110 + #112 for the temporary fallback period.
      - name: Pre-teardown existing droplet (avoids DO 1m delete timeout)
        timeout-minutes: 7
        env:
          DIGITALOCEAN_TOKEN: ${{ env.DIGITALOCEAN_TOKEN_TEARDOWN }}
        run: bash scripts/qa-teardown-droplet.sh

      # Plan + apply in one shot — no saved plan file. Slightly slower
      # than plan-then-apply-binary, but eliminates the stale-plan failure
      # mode and works regardless of whether taint ran.
      #
      # ACME endpoint: workflow_dispatch input use_staging_acme=true passes
      # the LE staging URL (no rate limits, browser warnings). Otherwise
      # var.acme_endpoint defaults to LE prod (real certs).
      - name: Terraform apply
        timeout-minutes: 10
        working-directory: infra/terraform/environments/qa
        env:
          USE_STAGING: ${{ github.event.inputs.use_staging_acme }}
        run: |
          if [ "${USE_STAGING:-false}" = "true" ]; then
            echo "::notice::Using LE STAGING for cert issuance (browser warnings; rate-limit-free)"
            terraform apply -input=false -auto-approve \
              -var='acme_endpoint=https://acme-staging-v02.api.letsencrypt.org/directory'
          else
            terraform apply -input=false -auto-approve
          fi

      # Run even if Terraform apply failed — if a droplet got created before
      # the failure, we still want its IP in the Discord post so the operator
      # can SSH in and debug. `terraform output` returns empty on missing
      # outputs; the `|| true` fallbacks keep the step from failing the job.
      - name: Capture outputs
        id: tf_outputs
        if: always()
        timeout-minutes: 1
        working-directory: infra/terraform/environments/qa
        run: |
          DROPLET_IP=$(terraform output -raw droplet_ipv4 2>/dev/null || echo "")
          QA_URLS_JSON=$(terraform output -json qa_urls 2>/dev/null || echo "")
          echo "droplet_ip=$DROPLET_IP" >> "$GITHUB_OUTPUT"
          echo "qa_urls=$QA_URLS_JSON" >> "$GITHUB_OUTPUT"

      # Poll the droplet for the cloud-init grove-ready sentinel via SSH.
      # Three-way check per iteration:
      #   1. happy path -- grove-ready sentinel exists -> exit 0
      #   2. sad path   -- known error pattern in compose/cloud-init logs ->
      #                    fail fast with the offending lines surfaced
      #   3. progress   -- print the last line of grove-qa-up.log so the workflow
      #                    log shows what cloud-init is doing in real time
      #                    (vs going silent for 20 min, then mystery-failing)
      #
      # Known-error patterns target the bugs we've hit historically:
      #   "pull access denied"         -> bad image ref (e.g. slothcored 404 on
      #                                   2026-06-26 deploy 28247373060)
      #   "Unexpected next token"      -> Caddyfile syntax error (2026-06-26
      #                                   deploy 28248283496 -- single-line {})
      #   "invalid integer value"      -> Odoo env-var substitution failure
      #                                   (2026-06-24 DB_PORT bug)
      #   "repository does not exist"  -> generic missing image
      #   "Error response from daemon" -> generic docker failure
      #   "failed to solve"            -> build-time failure (e.g. xcaddy)
      #
      # Generous outer deadline: first-time cloud-init + xcaddy build + DNS-01
      # cert provisioning can take 12-15 min on a cold droplet.
      - name: Wait for stack ready (cloud-init grove-ready sentinel)
        timeout-minutes: 20
        env:
          DROPLET_IP: ${{ steps.tf_outputs.outputs.droplet_ip }}
        run: |
          NOW=$(date +%s)
          DEADLINE=$(( NOW + 1200 ))   # 20 min
          SSH="ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/grove-qa-deploy root@$DROPLET_IP"

          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            # (1) happy path
            if $SSH "test -f /var/lib/cloud/instance/grove-ready" 2>/dev/null; then
              echo "  ✓ stack ready"
              exit 0
            fi

            # (2) sad path -- known error patterns
            ERR=$($SSH "
              if [ -f /var/log/grove-qa-up.log ]; then
                grep -E 'pull access denied|repository does not exist|Error response from daemon|Unexpected next token|invalid integer value|failed to solve' /var/log/grove-qa-up.log | tail -5
              fi
              if [ -f /var/log/cloud-init-output.log ]; then
                grep -iE 'fatal:|cloud-init.*error' /var/log/cloud-init-output.log | tail -5
              fi
            " 2>/dev/null || true)
            if [ -n "$ERR" ]; then
              echo "::error::Cloud-init / compose surfaced known error patterns:"
              echo "$ERR" | sed 's/^/  /'
              echo
              echo "Last 30 lines of /var/log/grove-qa-up.log:"
              $SSH "tail -30 /var/log/grove-qa-up.log 2>/dev/null" 2>/dev/null | sed 's/^/  /' || true
              echo
              echo "SSH in to debug: ssh -i ~/.ssh/grove-qa-admin root@$DROPLET_IP"
              exit 1
            fi

            # (3) progress hint
            PROGRESS=$($SSH "
              if [ -f /var/log/grove-qa-up.log ]; then
                tail -1 /var/log/grove-qa-up.log
              else
                echo '(cloud-init in apt/docker install stage; compose-up not started yet)'
              fi
            " 2>/dev/null || echo "(SSH not yet responding; droplet may still be booting)")
            echo "  [$(date -u +%H:%M:%S)] ${PROGRESS}"
            sleep 30
          done

          # Hard fail when the sentinel never fires -- otherwise the workflow
          # declares success despite the stack being down. Discord then posts
          # URLs that resolve to nothing. Per code review 2026-06-24:
          # truthful CI status > continuing through a likely-broken deploy.
          echo "::error::droplet didn't signal grove-ready within 20 min -- stack likely broken. SSH in via ~/.ssh/grove-qa-admin and check /var/log/cloud-init-output.log + docker ps."
          exit 1

      # Post-deploy: sync qa_portal_pg URL to Infisical.
      #
      # qa_portal_pg is a co-located Postgres container (defined in compose +
      # cloud-init); its password is randomized at first boot and lives only in
      # /etc/grove/.env on the droplet. The Grove QA portal app (deployed
      # separately) reads QA_PORTAL_DATABASE_URL from Infisical at runtime, so
      # we need to push the freshly-constructed URL after every droplet recreate.
      #
      # The constructed URL uses container name `qa_portal_pg` as the host (not
      # the droplet IP) because it's resolved from inside the same Docker network
      # (qa_portal_net) the portal app joins. sslmode=disable is correct here:
      # traffic stays on the docker bridge inside one droplet, never touches a
      # network interface, and bare postgres:16 has no TLS configured anyway.
      #
      # Idempotent: `infisical secrets set` upserts by name. Password rotation
      # per deploy is expected — the portal app must re-fetch on each deploy.
      #
      # ONE-TIME PREREQUISITE: the /qa-portal folder must exist in Infisical
      # under grove-odoo / prod (create via Infisical UI; the API call below
      # writes the secret AT this path but doesn't create the path itself).
      - name: Post-deploy - push QA_PORTAL_DATABASE_URL to Infisical
        timeout-minutes: 3
        env:
          DROPLET_IP: ${{ steps.tf_outputs.outputs.droplet_ip }}
          # INFISICAL_TOKEN was set by the secrets-action step at the top of this
          # job. The CLI consumes the same token via env var — no re-auth needed.
          INFISICAL_TOKEN: ${{ env.INFISICAL_TOKEN }}
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/grove-qa-deploy root@$DROPLET_IP"

          # Install Infisical CLI on the runner (~3 sec; the official installer
          # script just downloads the binary + chmod +x).
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y infisical

          # Read the rotated password from the droplet's /etc/grove/.env. grep + cut
          # to avoid sourcing the file (which would expose other secrets in this
          # workflow's env). Quote-strip just in case (the .env line shouldn't
          # have quotes but defense-in-depth).
          QPPW=$($SSH "grep '^QA_PORTAL_PG_PASSWORD=' /etc/grove/.env | cut -d= -f2-" 2>/dev/null | tr -d '"' | tr -d "'")
          if [ -z "$QPPW" ]; then
            echo "::error::Could not read QA_PORTAL_PG_PASSWORD from /etc/grove/.env on droplet."
            echo "  This means either: (a) cloud-init didn't substitute the placeholder,"
            echo "  (b) the .env file is missing the QA_PORTAL_PG_PASSWORD line, or"
            echo "  (c) SSH access broke between grove-ready and here."
            echo "  SSH to debug: ssh -i ~/.ssh/grove-qa-admin root@$DROPLET_IP"
            exit 1
          fi

          # Construct the URL. Container name `qa_portal_pg` is the host because
          # this URL is consumed from INSIDE qa_portal_net (the portal app's
          # container side), not from outside the droplet.
          URL="postgresql://qa_portal_app:${QPPW}@qa_portal_pg:5432/qa_portal?sslmode=disable"

          # Push to Infisical. --silent + redirect prevents the value from being
          # echoed in CI logs (the CLI normally prints the set value on success).
          # Path /qa-portal must exist; see prerequisite note above.
          infisical secrets set "QA_PORTAL_DATABASE_URL=$URL" \
            --token="$INFISICAL_TOKEN" \
            --projectId="850603f8-e175-4c38-9038-97a1e69d72e6" \
            --env="prod" \
            --path="/qa-portal" \
            --silent >/dev/null 2>&1

          # Verify by re-reading: just confirm the secret exists at the path with
          # a plausible length (URL should be ~95-110 chars for our scheme). We
          # do NOT echo the value — only the length, which leaks no key material.
          LEN=$(infisical secrets get QA_PORTAL_DATABASE_URL \
            --token="$INFISICAL_TOKEN" \
            --projectId="850603f8-e175-4c38-9038-97a1e69d72e6" \
            --env="prod" \
            --path="/qa-portal" \
            --plain 2>/dev/null | wc -c | tr -d ' ')
          if [ "$LEN" -lt 80 ]; then
            echo "::error::Infisical write appears to have failed: read-back length=$LEN bytes (expected ~95-110)."
            exit 1
          fi
          echo "  ✓ QA_PORTAL_DATABASE_URL pushed to grove-odoo/prod/qa-portal (read-back length=$LEN bytes)"

      # Post-deploy: bootstrap observability config (per ADR-007 addendum Phase 1.5).
      # Idempotent script POSTs openobserve/{monitors,alerts,dashboards}.json +
      # keep/{providers,workflows}.yml to the OpenObserve + Keep instances on the
      # observability droplet. Re-runs upsert by name/id so this is safe to call
      # every deploy.
      #
      # GATED on OPENOBSERVE_BASE_URL being set in Infisical. Today (pre-Level-3)
      # there is no obs droplet, so OPENOBSERVE_BASE_URL is unset and this step
      # skips cleanly. When Phase 1.5 of ADR-007 ships:
      #   1. Provision obs droplet via TF (separate from app droplet)
      #   2. Add to Infisical: OPENOBSERVE_BASE_URL, KEEP_BASE_URL, plus the 5
      #      secrets the script already requires (OPENOBSERVE_ROOT_EMAIL/_PASSWORD,
      #      KEEP_WEBHOOK_TOKEN, DISCORD_WEBHOOK_WARNING/_CRITICAL)
      #   3. Next qa-deploy auto-fires this step — no workflow change needed
      #
      # The script's URL functions (oo_base_url/keep_base_url) read these env
      # vars; without OPENOBSERVE_BASE_URL set they default to localhost (which
      # would 404 from a CI runner). The if-gate prevents that 404.
      - name: Post-deploy - bootstrap OpenObserve + Keep monitoring (gated)
        if: env.OPENOBSERVE_BASE_URL != ''
        timeout-minutes: 5
        run: |
          echo "::notice::OPENOBSERVE_BASE_URL is set ($OPENOBSERVE_BASE_URL) -- bootstrapping monitoring config"
          python3 scripts/setup-monitoring.py

      # Cert preference upgrade: if Caddy is currently serving an LE STAGING
      # cert (from a prior prod-rate-limit fallback), try to upgrade to LE
      # prod. Idempotent + safe: exit 0 if already on prod, exit 3 if prod
      # still rate-limited (no worse than current state), exit 4 if Caddy
      # unreachable. continue-on-error so a single failed upgrade attempt
      # doesn't fail the whole deploy.
      #
      # Also runs on its own cron (caddy-prefer-prod-cert.yml every 6h) to
      # catch stuck-on-staging certs between deploys.
      - name: Post-deploy - prefer prod cert over staging fallback
        if: always() && steps.tf_outputs.outputs.droplet_ip != ''
        timeout-minutes: 3
        continue-on-error: true
        env:
          # Materialize the ADMIN key (not deploy key) for cert ops -- script
          # needs to docker exec inside grove-qa-caddy-1, which requires the
          # admin key path. The CI key (~/.ssh/grove-qa-deploy) was written
          # earlier in this workflow; the upgrader script reads from
          # ~/.ssh/grove-qa-admin by default, so symlink.
          SSH_KEY: /home/runner/.ssh/grove-qa-deploy
        run: bash scripts/caddy-prefer-prod-cert.sh

      - name: Post URL list to Discord
        if: always()
        timeout-minutes: 1
        env:
          # DISCORD_OPS_WEBHOOK_URL set by Infisical fetch step at job start
          QA_URLS: ${{ steps.tf_outputs.outputs.qa_urls }}
          DROPLET_IP: ${{ steps.tf_outputs.outputs.droplet_ip }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          # TTL info -- the QA droplet is auto-destroyed by qa-ttl-sweeper.yml
          # after 4 days idle. Surface this in the Discord post so testers know
          # when they need to push a fresh deploy or kick off a manual teardown.
          QA_TTL_DAYS: "4"
        run: |
          # Build the per-URL field list. When TF apply failed earlier, QA_URLS
          # is empty -- fall back to an empty array so jq --argjson doesn't choke
          # on invalid JSON. The embed still posts (with no URL fields), making
          # failures visible in Discord instead of cascading to a workflow crash.
          if [ -z "$QA_URLS" ]; then
            FIELDS='[]'
          else
            FIELDS=$(echo "$QA_URLS" | jq '[to_entries[] | {name: .key, value: .value, inline: false}]')
          fi
          if [ "$STATUS" = "success" ]; then COLOR=5763719; ICON="🧪"; else COLOR=15158332; ICON="🚨"; fi

          # Auto-teardown date (informational). Uses GNU date arithmetic
          # (available on ubuntu-latest runners). Falls back gracefully if
          # date math fails.
          EXPIRES=$(date -u -d "+${QA_TTL_DAYS} days" '+%Y-%m-%d %H:%M UTC' 2>/dev/null || echo "in ${QA_TTL_DAYS} days")

          PAYLOAD=$(jq -n \
            --arg title "$ICON QA Deploy -- $STATUS" \
            --arg description "Commit \`$COMMIT_SHA\` by @$ACTOR. Droplet IP: $DROPLET_IP" \
            --arg footer "Auto-teardown if idle past $EXPIRES (run \`qa-teardown.yml\` to destroy sooner; push to \`qa\` to reset the clock)" \
            --arg run_url "$RUN_URL" \
            --argjson color "$COLOR" \
            --argjson fields "$FIELDS" \
            '{
              username: "🧪 Grove QA",
              embeds: [{
                title: $title,
                description: $description,
                url: $run_url,
                color: $color,
                fields: $fields,
                footer: { text: $footer }
              }]
            }')

          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_OPS_WEBHOOK_URL" || \
            echo "::warning::Discord post failed -- QA env is up regardless, URLs are in workflow logs"
