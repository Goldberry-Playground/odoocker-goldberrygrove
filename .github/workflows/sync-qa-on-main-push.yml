name: Sync qa branch from main

###############################################################################
# Auto-syncs `qa` branch to `main` on every push, then dispatches qa-deploy.
#
# Closes TWO footguns we hit on 2026-06-26:
#
# (1) qa-branch-stale: merged 5 PRs to main, qa branch was 5 commits behind.
#     The next `gh workflow run qa-deploy --ref qa` happily deployed the OLD
#     code, hiding the new fixes for ~30 min of false-positive debugging.
#     Force-push main -> qa eliminates this.
#
# (2) GH Actions anti-recursion: a `git push` made by GITHUB_TOKEN does NOT
#     trigger downstream `push:`-event workflows (per GH security policy).
#     So step #1 alone wasn't enough -- the qa branch updated, but qa-deploy
#     never auto-fired. Verified empirically: after merging PRs #95-98 + #94,
#     sync fired 4 times, qa branch moved 4 times, but qa-deploy stayed at
#     its pre-merge run for hours. workflow_dispatch IS allowed from
#     GITHUB_TOKEN though, so the second step here explicitly dispatches
#     qa-deploy after the push.
#
# Why force-push: qa is a deploy ref, not a feature branch. Expected state
# is "qa == main, always". Anyone pushing directly to qa is bypassing main
# protection, which is wrong; they should PR to main like normal.
#
# Why this is safe: qa-deploy.yml's concurrency.group=qa-deploy and
# cancel-in-progress=true means the new dispatch cancels any in-flight
# deploy and starts a fresh one. No orphan jobs.
###############################################################################

on:
  push:
    branches: [main]

permissions:
  contents: write   # push qa branch
  actions: write    # dispatch qa-deploy.yml

# One sync at a time. If multiple main pushes land back-to-back, the later
# one wins (cancel-in-progress collapses to the freshest commit).
concurrency:
  group: sync-qa
  cancel-in-progress: true

jobs:
  sync:
    name: Force-push main -> qa
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout main (full history -- need it to push as fast-forward when possible)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main

      - name: Push main -> qa (force, since qa is a deploy ref)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The merge commit SHA on main IS the new qa HEAD. Force-push so
          # qa moves even if its history diverged (e.g. operator hot-fixed
          # directly on qa during an incident).
          git push --force origin HEAD:qa
          echo "✓ qa synced to main @ $(git rev-parse --short HEAD)"

      # GITHUB_TOKEN pushes don't trigger downstream push: workflows. So
      # the push above alone is necessary-but-not-sufficient. Explicitly
      # dispatch qa-deploy here -- workflow_dispatch IS allowed from
      # GITHUB_TOKEN. Same pattern as chain-qa-after-image-rebuild.yml.
      #
      # If a chain-after-image-rebuild dispatch is also in flight (e.g. a
      # main push that touched both odoo/ and a workflow file), the two
      # dispatches collide on qa-deploy's concurrency.group=qa-deploy with
      # cancel-in-progress=true -- the later one wins, which is correct
      # (it has all the recent changes by definition).
      - name: Classify changes + dispatch the right workflow (or skip)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Path-based dispatch (2026-06-27): not every main merge needs a
          # full QA deploy. Doc-only PRs, CI workflow changes, and operator
          # scripts have ZERO effect on the running droplet. Classify the
          # changed paths and dispatch the smallest-cost workflow OR skip.
          #
          # Compare merged commit to its parent (HEAD~1 for squash/rebase
          # merges, first parent for true merge commits — git handles both).
          changed=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files in this merge:"
          echo "$changed" | sed 's/^/  /'
          echo

          full_deploy=0
          compose_only=0

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              # FULL DEPLOY (droplet recreate): TF / cloud-init / odoo image
              infra/terraform/environments/qa/*.tf | \
              infra/terraform/environments/qa/.terraform.lock.hcl | \
              infra/terraform/environments/qa/cloud-init.yaml.tpl | \
              odoo/* | \
              infra/terraform/modules/*)
                full_deploy=1 ;;
              # COMPOSE FAST PATH (~2 min, no recreate): compose/Caddyfile
              infra/terraform/environments/qa/compose/*)
                compose_only=1 ;;
              # SKIP — no QA droplet impact
              docs/* | *.md | Makefile | LICENSE | CHANGELOG | \
              .github/workflows/* | .github/dependabot.yml | .github/CODEOWNERS | \
              scripts/qa-*.sh | \
              scripts/check-*.sh | \
              scripts/cleanup-acme-txts.sh | \
              scripts/caddy-prefer-prod-cert.sh | \
              scripts/setup-monitoring.py | \
              infra/terraform/environments/production/* | \
              infra/terraform/environments/preview/*)
                ;;
              # DEFAULT: unknown path → conservative full deploy
              *)
                echo "  ⚠ unclassified path: $f — triggering full deploy"
                full_deploy=1 ;;
            esac
          done <<< "$changed"

          if [ "$full_deploy" = "1" ]; then
            echo "→ FULL deploy (qa-deploy.yml): TF / cloud-init / odoo image changed"
            gh workflow run qa-deploy.yml \
              --ref qa \
              --repo "${{ github.repository }}"
          elif [ "$compose_only" = "1" ]; then
            echo "→ COMPOSE fast path (qa-compose-update.yml): compose/Caddyfile only"
            gh workflow run qa-compose-update.yml \
              --ref qa \
              --field branch=qa \
              --repo "${{ github.repository }}"
          else
            echo "→ SKIP: no QA-impacting changes in this merge"
            echo "  (docs / workflows / operator scripts only — running droplet unaffected)"
          fi
