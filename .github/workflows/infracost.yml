name: Infracost

# Comments the $/mo cost delta on PRs that touch infra/terraform/ — shift-left
# CostOps (spec §6, Sprint 2): catch a "+$40/mo" droplet resize in review, not on
# the next DO invoice. Pairs with the runtime DO-billing bridge (actuals) — this
# is the pre-merge estimate.
#
# ── PREREQ (operator setup — NOT yet done; this workflow skips until it is) ──
# Seed INFRACOST_API_KEY in 1Password (op://Grove Prod/odoocker/INFRACOST_API_KEY).
# The key is free: `infracost auth login` (or https://dashboard.infracost.io) →
# copy the key → add it to the odoocker item. It's a pricing-DB lookup key, not
# a cloud credential. Same self-documenting-prereq pattern as terraform-drift.yml.
#
# ── No DO creds needed ──
# Infracost parses the Terraform HCL directly (no `terraform init` / no provider
# auth), pricing droplet / volume / managed-database resources from the config.
# App Platform apps (digitalocean_app) aren't in Infracost's price DB yet → shown
# as "not estimated"; the droplet/PG/volume deltas are what this catches.
# Which envs get priced: infra/infracost.yml.
on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - "infra/infracost.yml"
      - ".github/workflows/infracost.yml"

permissions: {}

jobs:
  infracost:
    name: Infracost diff
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write   # post/update the single cost comment
      # no id-token needed: 1Password uses a service-account token, not OIDC

    steps:
      # Load INFRACOST_API_KEY from 1Password (ADR-0001 Phase 3 — retires
      # Infisical), exported to the job env for later steps. Read-only
      # grove-ci-prod-ro SA (OP_CI_SA_TOKEN).
      #
      # continue-on-error is deliberate: load-secrets-action hard-fails if an
      # op:// ref can't resolve, but this required check MUST NOT block merges
      # before the key is seeded. If the key is absent the step fails, the env
      # var stays unset, and the gate below skips the cost diff (job green) —
      # the same graceful-skip contract the old Infisical fetch gave.
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        continue-on-error: true
        timeout-minutes: 2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_CI_SA_TOKEN }}
          INFRACOST_API_KEY: op://Grove Prod/odoocker/INFRACOST_API_KEY
        with:
          export-env: true

      # Skip gracefully (job stays green) until INFRACOST_API_KEY is seeded in
      # 1Password. A required check must not block merges before the key exists;
      # once it's present every pricing step below runs. INFRACOST_API_KEY is
      # exported to the job env by the load-secrets step above (or simply
      # absent if not yet seeded).
      - name: Gate on the Infracost API key
        id: gate
        timeout-minutes: 1
        run: |
          if [ -n "$INFRACOST_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::INFRACOST_API_KEY not set in 1Password — skipping the cost diff. Seed op://Grove Prod/odoocker/INFRACOST_API_KEY to enable."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      # Install the Infracost CLI via the official script (no third-party action
      # to SHA-pin). The version is resolved with the AUTHENTICATED gh CLI — the
      # install script's own unauthenticated GitHub API call to find the latest
      # release gets rate-limited in CI ("Failed to fetch the latest release
      # tag"). `configure set` stores the key in ~/.config, never in argv/logs.
      - name: Install Infracost
        if: steps.gate.outputs.enabled == 'true'
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(gh release view --repo infracost/infracost --json tagName --jq .tagName)"
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh \
            | INFRACOST_VERSION="${version#v}" sh
          infracost configure set api_key "$INFRACOST_API_KEY"

      # Baseline: price the base branch first so the PR can be diffed against it.
      - name: Checkout base branch
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Infracost baseline (base branch)
        if: steps.gate.outputs.enabled == 'true'
        timeout-minutes: 5
        run: |
          infracost breakdown \
            --config-file=infra/infracost.yml \
            --format=json \
            --out-file=/tmp/infracost-base.json

      # Switch to the PR HEAD and diff against the baseline.
      - name: Checkout PR branch
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2

      - name: Infracost diff (PR vs base)
        if: steps.gate.outputs.enabled == 'true'
        timeout-minutes: 5
        run: |
          infracost diff \
            --config-file=infra/infracost.yml \
            --compare-to=/tmp/infracost-base.json \
            --format=json \
            --out-file=/tmp/infracost.json

      # Post (or update-in-place) one cost comment on the PR.
      - name: Post cost comment
        if: steps.gate.outputs.enabled == 'true'
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          infracost comment github \
            --path=/tmp/infracost.json \
            --repo="$GITHUB_REPOSITORY" \
            --github-token="$GH_TOKEN" \
            --pull-request="$PR_NUMBER" \
            --behavior=update
