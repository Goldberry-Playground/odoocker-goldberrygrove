name: Sandbox Deploy

# Triggers:
#   - PR labeled "qa"  → spin up a sandbox Droplet for QA review
#   - workflow_dispatch → manual sandbox on any branch
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      git_sha:
        description: "Full Git SHA to deploy (defaults to HEAD of the calling branch)"
        required: false
        default: ""

# Deny all permissions at the workflow level; jobs declare what they need.
permissions: {}

concurrency:
  # One sandbox per PR at a time — cancel the in-flight deploy when a new
  # commit is pushed while the label is still applied.
  group: sandbox-deploy-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  sandbox-deploy:
    # Only run when the "qa" label is applied (label event) or on dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'qa')

    name: Deploy sandbox Droplet
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read       # checkout
      pull-requests: write # post PR comment with Droplet IP + URLs
      id-token: write      # OIDC token for Infisical exchange (read-only scope)

    env:
      TF_DIR: infra/terraform/environments/sandbox
      # ── Infisical identity assignment ──────────────────────────────────
      # Identity:   gh-oidc-odoocker-shared (UUID c502a60d-4b37-4e15-9fd7-8186c80c2ad0)
      # Project:    grove-odoocker (slug grove-odoocker-qu8p)
      # Trust:      bound_subject repo+ref; NO workflow_ref binding (shared)
      # Co-tenants: terraform-drift.yml, sandbox-reaper.yml, docker-odoo.yml
      #             — see infra/terraform/environments/infisical-identities/README.md
      #
      # Fetched via Infisical OIDC (3 secrets):
      #   - DIGITALOCEAN_TOKEN, SPACES_ACCESS_KEY_ID, SPACES_SECRET_ACCESS_KEY
      # Still on GH Secrets (3 secrets — sandbox-specific, not yet seeded
      # into Infisical; documented gap per Phase 4 retrofit PR):
      #   - DO_SSH_KEY_ID (DO SSH key fingerprint for droplet auth)
      #   - SANDBOX_SSH_PRIVATE_KEY (SSH private key for droplet shell-in)
      #   - ENV_SANDBOX (the entire sandbox .env file contents)
      # Follow-up: seed these into grove-odoocker/prod via `make infisical-seed`
      # and migrate them off secrets.* refs.
      INFISICAL_PROJECT_SLUG: grove-odoocker-qu8p
      INFISICAL_ENV_SLUG: prod
      INFISICAL_IDENTITY_ID: c502a60d-4b37-4e15-9fd7-8186c80c2ad0

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          # Use the SHA being reviewed, not the merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # Fetch the 3 secrets currently in Infisical. See env block header for
      # which secrets are intentionally still on GH Secrets pending seeding.
      - name: Fetch secrets from Infisical (OIDC)
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        timeout-minutes: 2
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          secret-path: /
          export-type: env

      # The TF S3 backend reads AWS_* but Infisical holds them as SPACES_*
      # (canonical name — they're DO Spaces, not AWS).
      - name: Alias SPACES_* env vars to AWS_* for TF S3 backend
        timeout-minutes: 1
        run: |
          echo "AWS_ACCESS_KEY_ID=$SPACES_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SPACES_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"

      - name: Resolve deploy SHA
        id: sha
        timeout-minutes: 1
        env:
          INPUT_SHA: ${{ inputs.git_sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          SHA="$INPUT_SHA"
          if [ -z "$SHA" ]; then
            SHA="${PR_HEAD_SHA:-$GITHUB_SHA}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        timeout-minutes: 3
        with:
          terraform_version: "~1.9"

      - name: Write backend config
        timeout-minutes: 1
        run: |
          cat > "$TF_DIR/backend.hcl" <<'EOF'
          endpoint                    = "https://nyc3.digitaloceanspaces.com"
          bucket                      = "grove-tf-state"
          key                         = "sandbox/terraform.tfstate"
          region                      = "us-east-1"
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          force_path_style            = true
          EOF

      - name: Terraform init
        timeout-minutes: 5
        run: |
          terraform -chdir="$TF_DIR" init \
            -backend-config=backend.hcl \
            -input=false

      - name: Terraform apply
        id: tf_apply
        timeout-minutes: 10
        env:
          TF_VAR_git_sha: ${{ steps.sha.outputs.sha }}
          TF_VAR_ssh_key_ids: '["${{ secrets.DO_SSH_KEY_ID }}"]'
        run: |
          terraform -chdir="$TF_DIR" apply \
            -auto-approve \
            -input=false

      - name: Get Droplet IP
        id: droplet
        timeout-minutes: 1
        run: |
          IP=$(terraform -chdir="$TF_DIR" output -raw ipv4_address)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          echo "Droplet IP: $IP"

      - name: Write SSH deploy key
        timeout-minutes: 1
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SANDBOX_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Wait for cloud-init clone stage (10 min timeout)
        timeout-minutes: 12
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |
          echo "Polling $DROPLET_IP for cloud-init clone-done sentinel..."
          for i in $(seq 1 120); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i "$HOME/.ssh/deploy_key" \
                   "root@$DROPLET_IP" \
                   "test -f /var/lib/cloud/instance/clone-done" 2>/dev/null; then
              echo "Clone stage complete after ~$((i * 5))s"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "::error::cloud-init clone stage never completed within 10 minutes"
              exit 1
            fi
            sleep 5
          done

      - name: SCP .env.sandbox to Droplet
        timeout-minutes: 2
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |
          printf '%s' "${{ secrets.ENV_SANDBOX }}" > .env.sandbox
          scp -o StrictHostKeyChecking=no \
              -i "$HOME/.ssh/deploy_key" \
              .env.sandbox "root@$DROPLET_IP:/opt/grove/.env.sandbox"
          rm -f .env.sandbox

      - name: Wait for stack-up sentinel (10 min timeout)
        timeout-minutes: 12
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |
          echo "Polling $DROPLET_IP for stack-up sentinel..."
          for i in $(seq 1 120); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i "$HOME/.ssh/deploy_key" \
                   "root@$DROPLET_IP" \
                   "test -f /var/lib/cloud/instance/stack-up" 2>/dev/null; then
              echo "Stack up after ~$((i * 5))s"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "::error::Stack never came up within 10 minutes"
              exit 1
            fi
            sleep 5
          done

      # FOLLOW-UP (Sprint 4 W1.5 or W2):
      # This is a placeholder. The actual seeders to run after cloud-init completes are:
      #   - grove-odoo-modules/scripts/seed_payment_journals.py
      #   - grove-odoo-modules/scripts/seed_sales_teams.py
      # These are idempotent and were committed in Sprint 2 (May 1).
      # When wiring up, scp them onto the Droplet first, then run via `docker exec`.
      - name: Run database seeders
        timeout-minutes: 5
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i "$HOME/.ssh/deploy_key" \
              "root@$DROPLET_IP" \
              'cd /opt/grove && docker compose -p grove-sandbox \
                 -f docker-compose.yml \
                 -f docker-compose.override.grove.yml \
                 -f docker-compose.override.sandbox.yml \
                 --env-file .env.sandbox \
                 exec -T odoo /bin/bash -c \
                 "odoo --stop-after-init --load-language=en_US \
                   --init base 2>&1 | tail -5"' || true

      - name: Post PR comment with sandbox URLs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        timeout-minutes: 2
        if: github.event_name == 'pull_request'
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
          DEPLOY_SHA: ${{ steps.sha.outputs.sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ip = process.env.DROPLET_IP;
            const sha = process.env.DEPLOY_SHA.substring(0, 7);
            const body = [
              '## Sandbox deployed',
              '',
              `**Droplet IP:** \`${ip}\``,
              `**SHA:** \`${sha}\``,
              '',
              '| Service | URL |',
              '|---------|-----|',
              `| Odoo ERP | http://${ip}:8069 |`,
              `| Ghost — Goldberry Grove | http://${ip}:2368 |`,
              `| Ghost — George GGG | http://${ip}:2369 |`,
              `| Ghost — At The Grove Nursery | http://${ip}:2370 |`,
              '',
              '> Droplet is tagged `auto-destroy` and will be reaped within 24 hours.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
