name: Caddy prefer-prod cert upgrader

###############################################################################
# Periodically checks whether QA's Caddy is serving an LE STAGING cert
# (browser-untrusted) and tries to upgrade to LE PROD if so.
#
# WHY THIS EXISTS:
#   PR-D (#98) added Caddy multi-issuer fallback — when LE prod is
#   rate-limited, Caddy auto-falls back to LE staging so the deploy never
#   blocks. But once Caddy has a valid staging cert (~80 days lifetime), it
#   keeps using it. Browsers reject staging certs as "not trusted".
#
#   This workflow closes that gap: cron-checks the cert issuer, and if it's
#   staging, deletes the staging cert dir + restarts Caddy. Caddy then
#   requests a fresh cert from LE prod (the default issuer). If prod is
#   available now, browser-trusted cert. If prod is still rate-limited,
#   falls back to staging again (no worse than starting state).
#
#   Programmatic, no droplet reboot — only `docker restart grove-qa-caddy-1`
#   affects only the Caddy container. Postgres / Odoo / frontends keep
#   running uninterrupted.
#
# CADENCE:
#   - cron every 6 hours (catches stuck staging certs between deploys)
#   - workflow_dispatch (operator can trigger manually after a known LE
#     rate-limit reset, e.g. tomorrow when budget refreshes)
#   - ALSO wired into qa-deploy.yml as a post-deploy step so every deploy
#     also tries to upgrade
###############################################################################

on:
  schedule:
    - cron: "17 */6 * * *"  # 17 past the hour, every 6 hours (offset to avoid GH-cron herd)
  workflow_dispatch:

permissions: {}

concurrency:
  group: caddy-cert-upgrader
  cancel-in-progress: false  # let in-flight checks finish (~1 min)

jobs:
  check-and-upgrade:
    name: Detect staging cert + try prod upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      id-token: write  # Infisical OIDC

    env:
      INFISICAL_PROJECT_SLUG: grove-odoocker-qu8p
      INFISICAL_ENV_SLUG: prod
      INFISICAL_IDENTITY_ID: c502a60d-4b37-4e15-9fd7-8186c80c2ad0

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2

      - name: Fetch secrets from Infisical (OIDC)
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        timeout-minutes: 2
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          secret-path: /
          export-type: env

      - name: Materialize CI SSH private key
        timeout-minutes: 1
        run: |
          if [ -z "${GROVE_QA_CI_SSH_PRIVATE_KEY:-}" ]; then
            echo "::warning::GROVE_QA_CI_SSH_PRIVATE_KEY not set — skipping cert check"
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$GROVE_QA_CI_SSH_PRIVATE_KEY" > ~/.ssh/grove-qa-admin
          chmod 600 ~/.ssh/grove-qa-admin

      - name: Run cert upgrader
        id: upgrader
        timeout-minutes: 3
        run: bash scripts/caddy-prefer-prod-cert.sh
        continue-on-error: true  # we report outcome via exit code below

      - name: Report outcome
        if: always()
        env:
          UPGRADER_EXIT: ${{ steps.upgrader.outcome }}
        run: |
          case "$UPGRADER_EXIT" in
            success) echo "✓ cert is on LE prod (was already, or successfully upgraded)" ;;
            failure)
              # Distinguish "no droplet" vs "still rate-limited" by checking
              # the script's actual exit code, surfaced as outcome=failure.
              # We don't fail the workflow on rate-limit (exit 3) — that's
              # expected/transient and will retry next cron tick.
              echo "::warning::cert upgrader exited non-zero — likely still on staging (LE prod rate-limit) or droplet unreachable. Will retry next cron tick."
              ;;
            *) echo "::warning::unexpected upgrader outcome: $UPGRADER_EXIT" ;;
          esac
