name: Sandbox Reaper

# Destroy Droplets tagged "auto-destroy" that are older than 24 hours.
# Runs every 6 hours to keep costs contained.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions: {}

jobs:
  reap:
    name: Reap expired sandbox Droplets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write    # OIDC token for Infisical exchange (read-only scope)

    env:
      # ── Infisical identity assignment ──────────────────────────────────
      # Identity:   gh-oidc-odoocker-shared (UUID c502a60d-4b37-4e15-9fd7-8186c80c2ad0)
      # Project:    grove-odoocker (slug grove-odoocker-qu8p)
      # Trust:      bound_subject repo+ref; NO workflow_ref binding (shared)
      # Co-tenants: terraform-drift.yml, sandbox-deploy.yml, docker-odoo.yml
      #             — see infra/terraform/environments/infisical-identities/README.md
      # Secrets fetched: DIGITALOCEAN_TOKEN, DISCORD_OPS_WEBHOOK_URL
      INFISICAL_PROJECT_SLUG: grove-odoocker-qu8p
      INFISICAL_ENV_SLUG: prod
      INFISICAL_IDENTITY_ID: c502a60d-4b37-4e15-9fd7-8186c80c2ad0

    steps:
      # Fetch secrets from Infisical Cloud using GitHub OIDC. The action mints
      # an OIDC JWT (via permissions: id-token: write), POSTs to Infisical's
      # /api/v1/auth/oidc-auth/login, gets back a short-lived access token,
      # fetches secrets, and exports each as an env var for subsequent steps.
      - name: Fetch secrets from Infisical (OIDC)
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        timeout-minutes: 2
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          secret-path: /
          export-type: env

      - name: Install doctl
        uses: digitalocean/action-doctl@135ac0aa0eed4437d547c6f12c364d3006b42824 # v2.5.1
        timeout-minutes: 2
        with:
          # DIGITALOCEAN_TOKEN set by Infisical OIDC fetch step above.
          token: ${{ env.DIGITALOCEAN_TOKEN }}

      - name: List and destroy expired sandbox Droplets
        id: reap
        timeout-minutes: 5
        run: |
          CUTOFF=$(date -d '24 hours ago' +%s 2>/dev/null || date -v -24H +%s)
          DESTROYED=""
          SKIPPED=""

          echo "Fetching Droplets tagged auto-destroy..."
          DROPLETS=$(doctl compute droplet list \
            --tag-name auto-destroy \
            --format ID,Name,Created \
            --no-header \
            --output json)

          COUNT=$(echo "$DROPLETS" | jq length)
          echo "Found $COUNT Droplet(s) tagged auto-destroy"

          for row in $(echo "$DROPLETS" | jq -r '.[] | @base64'); do
            _jq() { echo "$row" | base64 --decode | jq -r "$1"; }
            ID=$(_jq '.id')
            NAME=$(_jq '.name')
            CREATED=$(_jq '.created_at')
            CREATED_EPOCH=$(date -d "$CREATED" +%s 2>/dev/null || \
                            date -j -f "%Y-%m-%dT%H:%M:%SZ" "$CREATED" +%s)

            if [ "$CREATED_EPOCH" -lt "$CUTOFF" ]; then
              echo "Destroying Droplet $ID ($NAME) -- created $CREATED"
              doctl compute droplet delete "$ID" --force
              DESTROYED="$DESTROYED\n- \`$NAME\` (id: $ID, created: $CREATED)"
            else
              echo "Skipping Droplet $ID ($NAME) -- not yet 24h old"
              SKIPPED="$SKIPPED\n- \`$NAME\` (id: $ID)"
            fi
          done

          {
            echo "destroyed<<EOF"
            printf '%b' "$DESTROYED"
            echo "EOF"
            echo "skipped<<EOF"
            printf '%b' "$SKIPPED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Discord webhook (consolidates with the GATH-44 monitoring stack's
      # Discord alerting). Built with jq -n so droplet names containing
      # backticks or other shell metacharacters can't inject into the payload.
      - name: Post Discord summary
        if: always()
        timeout-minutes: 1
        env:
          # DISCORD_OPS_WEBHOOK_URL set by Infisical OIDC fetch step at job start.
          REAPER_DESTROYED: ${{ steps.reap.outputs.destroyed }}
          REAPER_SKIPPED: ${{ steps.reap.outputs.skipped }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg run_url "$RUN_URL" \
            --arg destroyed "${REAPER_DESTROYED:-none}" \
            --arg skipped "${REAPER_SKIPPED:-none}" \
            '{
              username: "🪦 Sandbox Reaper",
              embeds: [{
                title: "Sandbox Reaper finished",
                url: $run_url,
                color: 5763719,
                fields: [
                  {name: "Destroyed", value: $destroyed, inline: false},
                  {name: "Still alive (< 24h)", value: $skipped, inline: false}
                ]
              }]
            }')
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_OPS_WEBHOOK_URL"
