name: AgenticOS P0 alerts (DO alert policies)

# GOL-53 P0.4b — create/refresh DigitalOcean Monitoring alert policies for the AgenticOS
# control-plane droplet (id 572389418) and route them to the ops Discord channel.
#
# Runs OFF the droplet: pulls the DO token from Infisical via OIDC (same identity the
# GOL-55 resize workflow uses), so NO DigitalOcean credential ever lives in an agent
# env — consistent with "DO/CF/Discord secrets live in CI, not the agent."
#
# Governance: workflow_dispatch only. Alert policies are $0 and reversible; the
# underlying script (infra/agenticos/04-do-alert-policies.sh) is idempotent — re-runs
# upsert by a [GOL-53] tag; pass replace=true to delete+recreate after tuning.

on:
  workflow_dispatch:
    inputs:
      replace:
        description: "Delete existing [GOL-53] policies and recreate (use after tuning thresholds)."
        type: boolean
        default: false

permissions: {}

concurrency:
  group: agenticos-p0-alerts
  cancel-in-progress: false

jobs:
  alerts:
    name: Create DO alert policies
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      id-token: write
    env:
      INFISICAL_PROJECT_SLUG: grove-odoocker-qu8p
      INFISICAL_ENV_SLUG: prod
      INFISICAL_IDENTITY_ID: c502a60d-4b37-4e15-9fd7-8186c80c2ad0
      DROPLET_ID: "572389418"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        timeout-minutes: 2

      - name: Fetch secrets from Infisical (OIDC)
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        timeout-minutes: 2
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          secret-path: /
          export-type: env

      - name: Preflight — required secrets present
        run: |
          set -euo pipefail
          : "${DIGITALOCEAN_TOKEN:?Infisical prod must provide DIGITALOCEAN_TOKEN (monitoring:read+write)}"
          # Ops alert channel: reuse the monitoring stack's critical webhook. If a
          # dedicated AgenticOS webhook is preferred, set OPS_DISCORD_WEBHOOK in Infisical.
          if [ -z "${OPS_DISCORD_WEBHOOK:-}" ] && [ -z "${DISCORD_WEBHOOK_CRITICAL:-}" ]; then
            echo "::error::Need OPS_DISCORD_WEBHOOK or DISCORD_WEBHOOK_CRITICAL in Infisical prod for alert routing."
            exit 1
          fi

      - name: Create / refresh alert policies
        env:
          REPLACE_INPUT: ${{ github.event.inputs.replace }}
        run: |
          set -euo pipefail
          export DO_API_TOKEN="$DIGITALOCEAN_TOKEN"
          export OPS_DISCORD_WEBHOOK="${OPS_DISCORD_WEBHOOK:-$DISCORD_WEBHOOK_CRITICAL}"
          export DROPLET_ID="$DROPLET_ID"
          export DISCORD_CHANNEL="grove-ops"
          ARG=""
          [ "${REPLACE_INPUT}" = "true" ] && ARG="--replace"
          bash infra/agenticos/04-do-alert-policies.sh $ARG

      - name: Summary
        if: always()
        run: |
          echo "### AgenticOS P0 alerts" >> "$GITHUB_STEP_SUMMARY"
          echo "Droplet: \`${DROPLET_ID}\` — policies: mem>80% (warn), mem>90% (crit), disk>85% (warn) -> Discord." >> "$GITHUB_STEP_SUMMARY"
          echo "Re-run with \`replace=true\` after tuning thresholds. Rollback: delete \`[GOL-53]\` policies by uuid." >> "$GITHUB_STEP_SUMMARY"
