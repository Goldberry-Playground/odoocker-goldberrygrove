# Bounded mechanical self-heal for agent PRs (GOL-308, from approved GOL-303).
#
# Applies the two auto-fixable checks this repo's CI enforces, and pushes ONE
# fix commit:
#   - Python (odoo/custom-addons/): ruff --fix + ruff format
#       mirrors the "Lint Python (Odoo Modules)" job.
#   - Terraform (infra/terraform/): terraform fmt -recursive
#       mirrors the "Terraform fmt + validate" job's fmt -check gate.
# Non-mechanical failures leave no diff and stay red for the CI failure router
# to escalate. See grove-sites ci-autofix.yml for the full rationale, the
# `pull_request` (not `workflow_run`) security reasoning, and the GITHUB_TOKEN
# re-trigger limitation (identical here).
#
# Guardrails: same-repo agent-authored PRs only; one autofix commit per push
# (skips if the head commit is already a "[ci-autofix]" commit); no-op on a
# clean diff.
name: CI autofix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ci-autofix-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  autofix:
    # Same-repo only — fork code never runs with a write-scoped token.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Gate (agent author + loop guard)
        id: gate
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          case "$AUTHOR" in
            agenticos-developer|agenticos-developer[bot]|app/agenticos-developer) ;;
            *)
              echo "PR author '$AUTHOR' is not the agent App bot; skipping."
              echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          LAST_MSG=$(git log -1 --pretty=%s)
          if printf '%s' "$LAST_MSG" | grep -q '\[ci-autofix\]'; then
            echo "Head commit is already a [ci-autofix] commit; skipping to prevent loops."
            echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform
        if: steps.gate.outputs.proceed == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Apply mechanical fixes (ruff + terraform fmt)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          # Python — only if custom-addons actually has .py files (matches CI's guard).
          if find odoo/custom-addons/ -name "*.py" 2>/dev/null | grep -q .; then
            pip install ruff
            ruff check odoo/custom-addons/ --select E,F,I --line-length 120 --fix || true
            ruff format odoo/custom-addons/ --line-length 120 || true
          else
            echo "No Python files in custom-addons/, skipping ruff."
          fi
          # Terraform fmt (recursive) over the tree CI fmt-checks.
          if [ -d infra/terraform/ ]; then
            terraform fmt -recursive infra/terraform/ || true
          else
            echo "No infra/terraform/, skipping terraform fmt."
          fi

      - name: Commit & push one fix commit (or skip if clean)
        if: steps.gate.outputs.proceed == 'true'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No mechanical fixes to apply — non-mechanical failure, leaving for the CI failure router (E1)."
            exit 0
          fi
          git commit \
            -m "chore(ci): apply mechanical ruff + terraform fmt fixes [ci-autofix]" \
            -m "Automated bounded self-heal for an agent PR. One commit per push (GOL-308)." \
            -m "Co-authored-by: Paperclip <noreply@paperclip.ing>"
          git push origin "HEAD:$HEAD_REF"
          echo "::notice::Pushed one [ci-autofix] commit to $HEAD_REF. NOTE: GITHUB_TOKEN pushes do not re-trigger pull_request checks — the next agent push or a maintainer 'Re-run' will re-validate."
