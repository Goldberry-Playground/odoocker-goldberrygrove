name: Infisical Secret Migration (ONE-OFF)

###############################################################################
# ONE-OFF migration workflow: copies the named GH Secrets into Infisical's
# grove-odoocker/prod project. Triggered manually via workflow_dispatch.
#
# DELETE THIS WORKFLOW after one successful run. Repurposing it for ongoing
# migration creates a standing high-privilege attack surface.
#
# Prerequisite: temporarily push the tf-infisical-admin Universal Auth client
# credentials to this repo's GH Secrets (from 1Password):
#
#   op read 'op://Goldberry Grove - Admin/GoldberryGrove Infra/infisical_admin_client_id' \
#     | gh secret set INFISICAL_ADMIN_CLIENT_ID --repo Goldberry-Playground/odoocker-goldberrygrove
#   op read 'op://Goldberry Grove - Admin/GoldberryGrove Infra/infisical_admin_client_secret' \
#     | gh secret set INFISICAL_ADMIN_CLIENT_SECRET --repo Goldberry-Playground/odoocker-goldberrygrove
#
# After the workflow runs successfully, ALSO delete those two GH Secrets:
#
#   gh secret delete INFISICAL_ADMIN_CLIENT_ID --repo Goldberry-Playground/odoocker-goldberrygrove
#   gh secret delete INFISICAL_ADMIN_CLIENT_SECRET --repo Goldberry-Playground/odoocker-goldberrygrove
#
# Why the secrets get the admin role temporarily and not a per-workflow
# OIDC identity: this migration writes to Infisical, which requires admin
# scope. Creating a permanent strict-bound OIDC identity for "write all
# secrets" would itself be a 5-cap slot we don't have. One-off migration
# with temporary admin creds + immediate cleanup is the pragmatic path.
###############################################################################

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  migrate:
    name: Migrate GH Secrets → Infisical (grove-odoocker/prod)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read  # checkout

    env:
      # Infisical admin auth — temporarily pushed to GH Secrets per the header.
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_ADMIN_CLIENT_ID }}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_ADMIN_CLIENT_SECRET }}
      INFISICAL_PROJECT_ID: 850603f8-e175-4c38-9038-97a1e69d72e6
      INFISICAL_ENV_SLUG: prod
      INFISICAL_SECRET_PATH: /

      # The secrets to migrate. Each must exist as a GH Secret on this repo
      # AND be referenced here by name so the bulk-set script can read it
      # from the env. Adding/removing a secret = edit this list + the args
      # to the script invocation below.
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      PROD_HOST: ${{ secrets.PROD_HOST }}
      SANDBOX_HOST: ${{ secrets.SANDBOX_HOST }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      DO_SSH_KEY_ID: ${{ secrets.DO_SSH_KEY_ID }}
      SANDBOX_SSH_PRIVATE_KEY: ${{ secrets.SANDBOX_SSH_PRIVATE_KEY }}
      ENV_SANDBOX: ${{ secrets.ENV_SANDBOX }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        timeout-minutes: 2

      - name: Bulk-set secrets in Infisical
        timeout-minutes: 5
        run: |
          ./scripts/infisical-bulk-set.sh \
            PROD_SSH_PRIVATE_KEY \
            PROD_HOST \
            SANDBOX_HOST \
            GRAFANA_URL \
            DO_SSH_KEY_ID \
            SANDBOX_SSH_PRIVATE_KEY \
            ENV_SANDBOX
