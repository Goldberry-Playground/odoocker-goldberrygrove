name: CI Failure Notify

###############################################################################
# One notifier for every remaining CI workflow's MAIN-BRANCH failures --
# fills the gap left by retiring the monolith pipeline (which was the only
# thing that spoke Discord). PR failures stay out of Discord on purpose:
# they're visible in the PR UI and would be pure noise.
#
# Uses discord-status.sh's streak grammar keyed to the SOURCE workflow, so
# "docker-odoo failed 3x in a row" escalates with @here exactly like the
# old deploy alerts did, and the first green run posts RECOVERED.
###############################################################################

on:
  workflow_run:
    workflows:
      - CI
      - Security Scans
      - "Docker — Odoo"
      - "Docker -- Caddy w/ DO DNS plugin"
    types: [completed]
    branches: [main]

permissions: {}

concurrency:
  group: ci-failure-notify-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  notify:
    name: Discord on main-branch failure/recovery
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Run for BOTH conclusions: failures alert; successes let the script
    # post RECOVERED when they break a streak (and stay silent otherwise
    # via --quiet-success).
    if: github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      # no id-token needed: 1Password uses a service-account token, not OIDC
      actions: read     # streak history of the SOURCE workflow

    env:
      # workflow_run payload fields are repo-defined (workflow name) or
      # GitHub-generated (conclusion, urls) -- passed via env regardless,
      # per the injection-safe pattern.
      SRC_NAME: ${{ github.event.workflow_run.name }}
      SRC_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
      SRC_URL: ${{ github.event.workflow_run.html_url }}
      SRC_PATH: ${{ github.event.workflow_run.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2

      # Load the Discord webhook from 1Password (ADR-0001 Phase 3 — retires
      # Infisical). export-env exposes DISCORD_OPS_WEBHOOK_URL to the Discord
      # step below. Read-only grove-ci-prod-ro SA (OP_CI_SA_TOKEN).
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        timeout-minutes: 2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_CI_SA_TOKEN }}
          DISCORD_OPS_WEBHOOK_URL: op://Grove Prod/odoocker/DISCORD_OPS_WEBHOOK_URL
        with:
          export-env: true

      - name: Discord
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # streak detection keys on the workflow FILE name
          WF_FILE=$(basename "$SRC_PATH")
          bash scripts/discord-status.sh \
            --status="$SRC_CONCLUSION" \
            --workflow="$WF_FILE" \
            --run-url="$SRC_URL" \
            --title="$SRC_NAME (main)" \
            --quiet-success || true
