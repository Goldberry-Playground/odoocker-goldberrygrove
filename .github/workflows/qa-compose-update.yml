name: QA Compose Update (fast path)

###############################################################################
# Fast-path for compose/Caddyfile-only changes -- no droplet recreate.
#
# Normal qa-deploy.yml does a full TF apply: any change to compose YAML,
# Caddyfile, or cloud-init template forces droplet REPLACE (user_data is
# templated from those files), which costs ~10-15 min. For compose-only
# iteration (env var tweaks, new container, Caddy route change), that's
# enormous overhead.
#
# This workflow rsyncs the just-pushed Caddyfile + compose YAML onto the
# existing droplet, pulls fresh images, restarts containers in place,
# reloads Caddy. ~2 min total.
#
# CAVEAT: this creates TF state drift -- TF thinks user_data is the OLD
# rendered template; the droplet actually has the NEW one. The next full
# qa-deploy run will REPLACE the droplet to re-converge. That's the right
# behavior; this fast path is for "preview my change quickly," not "skip
# the codification step."
#
# Recommended flow:
#   1. push compose change to feature branch
#   2. workflow_dispatch this workflow with ref=<feature-branch>
#   3. preview at qa URLs, iterate
#   4. when happy: PR to main, merge, normal qa-deploy.yml recreates
#      droplet with the same content (no functional change, just codifies)
#
# When NOT to use this:
#   - cloud-init.yaml.tpl changes (this workflow doesn't re-run cloud-init)
#   - TF resource changes (this workflow doesn't run TF at all)
#   - first deploy (no droplet exists -- this workflow no-ops)
#   - new env vars that need /etc/grove/.env regeneration (cloud-init writes
#     .env once at droplet boot; this workflow doesn't touch it)
###############################################################################

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to rsync compose/Caddyfile from. Default = qa."
        type: string
        default: "qa"

permissions: {}

concurrency:
  # Sequenced with qa-deploy so they don't fight over the same droplet's
  # docker daemon. If a full qa-deploy is in flight, this waits; if this
  # is in flight and a qa-deploy gets dispatched, qa-deploy cancels this.
  group: qa-deploy
  cancel-in-progress: true

jobs:
  compose-update:
    name: SSH-update compose + restart containers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write   # Infisical OIDC

    env:
      INFISICAL_PROJECT_SLUG: grove-odoocker-qu8p
      INFISICAL_ENV_SLUG: prod
      INFISICAL_IDENTITY_ID: c502a60d-4b37-4e15-9fd7-8186c80c2ad0

    steps:
      # Validate the branch input shape BEFORE passing it to actions/checkout.
      # workflow_dispatch inputs are operator-controlled (admin permission)
      # not attacker-controlled (no repository_dispatch on this workflow), so
      # this is hygiene rather than a sharp security boundary -- but the
      # regex makes "ref injection" structurally impossible regardless of
      # threat model.
      - name: Validate branch input is a safe git ref
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          if [[ ! "$BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Refusing to checkout: branch '$BRANCH' contains characters outside [A-Za-z0-9._/-]"
            exit 1
          fi

      - name: Checkout requested branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 2
        with:
          ref: ${{ inputs.branch }}

      - name: Fetch secrets from Infisical (OIDC)
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        timeout-minutes: 2
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          secret-path: /
          export-type: env

      - name: Materialize CI SSH private key
        timeout-minutes: 1
        run: |
          if [ -z "${GROVE_QA_CI_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::GROVE_QA_CI_SSH_PRIVATE_KEY not set"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$GROVE_QA_CI_SSH_PRIVATE_KEY" > ~/.ssh/grove-qa-deploy
          chmod 600 ~/.ssh/grove-qa-deploy

      - name: Discover droplet IP via DO API
        id: droplet
        timeout-minutes: 1
        run: |
          ip=$(curl -sf -H "Authorization: Bearer $DIGITALOCEAN_TOKEN" \
            "https://api.digitalocean.com/v2/droplets?tag_name=env-qa" \
            | jq -r '.droplets[0].networks.v4[] | select(.type=="public") | .ip_address')
          if [ -z "$ip" ] || [ "$ip" = "null" ]; then
            echo "::error::No env-qa droplet found. Use qa-deploy.yml for first deploy."
            exit 1
          fi
          echo "Found droplet IP: $ip"
          echo "ip=$ip" >> "$GITHUB_OUTPUT"

      # Substitute QA_ZONE in Caddyfile.tpl the same way TF does (since we're
      # bypassing TF). Hardcoded zone matches main.tf's local.qa_zone default.
      - name: Render Caddyfile with QA_ZONE substituted
        timeout-minutes: 1
        run: |
          QA_ZONE="qa.gatheringatthegrove.com"
          sed "s|\${QA_ZONE}|${QA_ZONE}|g" \
            infra/terraform/environments/qa/compose/Caddyfile.tpl \
            > /tmp/Caddyfile.rendered

      - name: rsync compose + Caddyfile to droplet
        timeout-minutes: 2
        env:
          IP: ${{ steps.droplet.outputs.ip }}
        run: |
          # Audit fix SC2086 (2026-06-29): bash array preserves multiple
          # flags as separate args. Previous unquoted $SSH_OPTS relied on
          # word-splitting which shellcheck flags as a footgun.
          SSH_OPTS=(-i ~/.ssh/grove-qa-deploy -o StrictHostKeyChecking=no -o ConnectTimeout=10)
          # Caddyfile (rendered) -- atomic via tmp + rename
          scp "${SSH_OPTS[@]}" /tmp/Caddyfile.rendered "root@$IP:/etc/grove/Caddyfile.new"
          ssh "${SSH_OPTS[@]}" "root@$IP" 'mv /etc/grove/Caddyfile.new /etc/grove/Caddyfile'
          # compose YAML (verbatim)
          scp "${SSH_OPTS[@]}" \
            infra/terraform/environments/qa/compose/docker-compose.qa.yml \
            "root@$IP:/etc/grove/docker-compose.yml.new"
          ssh "${SSH_OPTS[@]}" "root@$IP" 'mv /etc/grove/docker-compose.yml.new /etc/grove/docker-compose.yml'

      - name: docker compose pull + up + caddy reload
        timeout-minutes: 5
        env:
          IP: ${{ steps.droplet.outputs.ip }}
        run: |
          # Audit fix SC2086 (2026-06-29): same array pattern as the step above.
          SSH_OPTS=(-i ~/.ssh/grove-qa-deploy -o StrictHostKeyChecking=no -o ConnectTimeout=10)
          ssh "${SSH_OPTS[@]}" "root@$IP" 'bash -c "
            set -e
            cd /etc/grove
            echo \"--- pulling fresh images ---\"
            docker compose --env-file .env pull
            echo \"--- recreating containers with new config ---\"
            docker compose --env-file .env up -d
            echo \"--- reloading Caddy (separate from up -d to pick up Caddyfile changes) ---\"
            docker exec grove-qa-caddy-1 caddy reload --config /etc/caddy/Caddyfile 2>&1 | tail -5
            echo \"--- final container status ---\"
            docker ps --format \"{{.Names}} {{.Status}}\"
          "'

      - name: Verify URLs serving
        timeout-minutes: 2
        run: |
          ok=0
          fail=0
          for h in hub.qa goldberry.qa ggg.qa nursery.qa odoo.qa; do
            code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 8 "https://${h}.gatheringatthegrove.com/" || echo 000)
            case "$code" in
              200|303) echo "  ✓ $h.gatheringatthegrove.com  $code"; ok=$((ok+1)) ;;
              *)       echo "  ✗ $h.gatheringatthegrove.com  $code"; fail=$((fail+1)) ;;
            esac
          done
          echo
          echo "Summary: $ok ok, $fail failing"
          if [ "$fail" -gt 0 ]; then
            echo "::warning::$fail URL(s) not responding. May be transient (caddy reload in progress) -- re-check in 30s."
            # Don't fail the workflow -- compose update succeeded; URL issues may be cert-related
          fi
