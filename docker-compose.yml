services:
  odoo:
    build:
      context: ./
      dockerfile: ./odoo/Dockerfile
      args:
        - ODOO_TAG
        - ODOO_RC
        - ROOT_PATH
        - ENTERPRISE_USER
        - ENTERPRISE_ACCESS_TOKEN
        - ENTERPRISE_ADDONS
        - GITHUB_USER
        - GITHUB_ACCESS_TOKEN
        - THIRD_PARTY_ADDONS
        - LOG_PATH
        - USE_REDIS
        - USE_S3
        - USE_SENTRY
    tty: true
    volumes:
      - odoo-data:${DATA_DIR}
      - ./odoo/extra-addons:${EXTRA_ADDONS}
      - ./odoo/custom-addons:${CUSTOM_ADDONS}
      - ./odoo/entrypoint.sh:/entrypoint.sh
      # Bind-mount .env at runtime instead of baking it into the image.
      # The Dockerfile no longer `COPY`s .env, so secrets don't live in
      # any image layer. Read-only mount = container can't tamper with
      # the operator's source-of-truth.
      - ./.env:/.env:ro
      # Shared volume for git-sync live module updates (managed by custom-modules-sync service)
      - custom-modules-data:/workspace
    environment:
      - HOST=${DB_HOST}
      - PORT=${DB_PORT}
      - USER=${DB_USER}
      - PASSWORD=${DB_PASSWORD}
      - ODOO_TAG
      - ODOO_RC
      - USE_REDIS
      - USE_S3
      - USE_SENTRY
      - THIRD_PARTY_ADDONS
      - ODOO_SESSION_REDIS
      - ODOO_SESSION_REDIS_HOST
      - ODOO_SESSION_REDIS_PORT
      - ODOO_SESSION_REDIS_PASSWORD
      - ODOO_SESSION_REDIS_URL
      - ODOO_SESSION_REDIS_PREFIX
      - ODOO_SESSION_REDIS_SENTINEL_MASTER_NAME
      - ODOO_SESSION_REDIS_SENTINEL_HOST
      - ODOO_SESSION_REDIS_SENTINEL_PORT
      - ODOO_SESSION_REDIS_EXPIRATION
      - ODOO_SESSION_REDIS_EXPIRATION_ANONYMOUS
      - AWS_HOST
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_BUCKETNAME
    networks:
      - internal
    profiles: [$ODOO_PROFILES]

  postgres:
    build:
      context: ./
      dockerfile: ./postgres/Dockerfile
      args:
        - POSTGRES_TAG
    tty: true
    # Increase Docker's /dev/shm to match shared_buffers so PostgreSQL uses
    # POSIX shared memory instead of slower mmap fallback.
    # Rule of thumb: shm_size >= POSTGRES_SHARED_BUFFERS + 256MB headroom.
    shm_size: '1536mb'
    command: >
      postgres
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-1GB}
      -c effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-3GB}
      -c work_mem=${POSTGRES_WORK_MEM:-16MB}
      -c maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}
      -c wal_buffers=${POSTGRES_WAL_BUFFERS:-16MB}
      -c max_wal_size=${POSTGRES_MAX_WAL_SIZE:-4GB}
      -c checkpoint_completion_target=0.9
      -c random_page_cost=${POSTGRES_RANDOM_PAGE_COST:-1.1}
      -c effective_io_concurrency=${POSTGRES_EFFECTIVE_IO_CONCURRENCY:-200}
      -c log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION_STATEMENT:-1000}
      -c max_connections=${DB_MAXCONN:-100}
      -c default_statistics_target=100
    volumes:
      - pg-data:${PGDATA}
      - ./postgres/entrypoint.sh:/docker-entrypoint-initdb.d/entrypoint.sh
      # Bind-mount .env at runtime instead of baking it into the image.
      - ./.env:/.env:ro
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - PGDATA
      - DB_USER
      - DB_PASSWORD
      - DB_TEMPLATE
      - UNACCENT_TEMPLATE
      - PGADMING_DB_NAME
      - PGADMING_DB_USER
      - PGADMIN_DB_PASSWORD
    networks:
      - internal
    profiles: [$POSTGRES_PROFILES]

  nginx:
    image: nginx:${NGINX_TAG}
    depends_on:
      - odoo
    tty: true
    expose:
      - 80/tcp
    volumes:
      - ./nginx/nginx.conf:${NGINX_CONF}
      - ./nginx/default.conf:${NGINX_DEFAULT_CONF}
    environment:
      # VIRTUAL_HOST contains all domains (backend + client sites). nginx-proxy reads this
      # and routes every listed domain to this container. Inner nginx uses server_name _
      # (catch-all) and proxies everything to Odoo, which selects the correct website by $host.
      - VIRTUAL_HOST
      - LETSENCRYPT_HOST
      - LETSENCRYPT_EMAIL
      - CLIENT_DOMAINS
      - CORS_ALLOWED_DOMAIN
    networks:
      - internal
    profiles: [$NGINX_PROFILES]

  nginx-proxy:
    image: nginxproxy/nginx-proxy:${NGINX_PROXY_TAG}
    depends_on:
      - nginx
    tty: true
    volumes:
      - ./nginx-proxy/nginx.conf:${NGINX_CONF}
      - ./nginx-proxy/cors.conf:${NGINX_PROXY_CORS_CONF}
      - html:${NGINX_HTML}
      - vhost:${NGINX_VHOST}
      - certs:${NGINX_CERTS}:ro
      - ${DOCKER_SOCK}:${TEMP_DOCKER_SOCK}:ro
    environment:
      - TRUST_DOWNSTREAM_PROXY
      - CORS_ALLOWED_DOMAIN
    networks:
      - internal
    profiles: [$NGINX_PROXY_PROFILES]

  letsencrypt:
    image: nginxproxy/acme-companion:${ACME_COMPANION_TAG}
    depends_on:
      - nginx-proxy
    volumes_from:
      - nginx-proxy:rw
    volumes:
      - certs:${NGINX_CERTS}:rw
      - acme:${NGINX_ACME}
      - ${DOCKER_SOCK}:${DOCKER_SOCK}:ro
    environment:
      - ACME_CA_URI
      - CERTS_UPDATE_INTERVAL
      - DEFAULT_EMAIL
    networks:
      - internal
    profiles: [$ACME_COMPANION_PROFILES]

  redis:
    image: eqalpha/keydb:${KEYDB_TAG}
    platform: linux/amd64
    # No `ports:` here — KeyDB is reached by Odoo over the internal Docker
    # network. The base used to publish ${KEYDB_PORT} on 0.0.0.0, which
    # leaked through to sandbox/production because those overlays never
    # set ports: [] to undo it. Loopback dev access is in override.local.yml.
    volumes:
      - redis-data:${KEYDB_DATA}
    networks:
      - internal
    profiles: [$KEYDB_PROFILES]

  s3:
    image: minio/minio:${MINIO_TAG}
    environment:
      - MINIO_ROOT_USER
      - MINIO_ROOT_PASSWORD
      - MINIO_BROWSER_REDIRECT_URL
      - VIRTUAL_HOST=${MINIO_VIRTUAL_HOST}
      - VIRTUAL_PORT=${MINIO_CONSOLE_PORT}
    command: server ${MINIO_DATA} --console-address ":${MINIO_CONSOLE_PORT}"
    volumes:
      - s3-data:${MINIO_DATA}
    # No `ports:` here — MinIO is reached by Odoo over the internal Docker
    # network, and the console is fronted by nginx-proxy via VIRTUAL_HOST.
    # The base used to publish API + console ports on 0.0.0.0, which
    # leaked through to sandbox/production with default credentials
    # `myaccesskey`/`mysecretkey`. Loopback dev access is in override.local.yml.
    networks:
      - internal
    profiles: [$MINIO_PROFILES]

  pgadmin:
    build:
      context: ./
      dockerfile: ./pgadmin/Dockerfile
      args:
        - PGADMIN_TAG
    depends_on:
      - nginx-proxy
    expose:
      - 80
    volumes:
      - pgadmin-data:${PGADMIN_DATA}
      # Bind-mount .env at runtime — start_pgadmin.sh sources this at
      # container start. Dockerfile no longer bakes the file.
      - ./.env:/.env:ro
    environment:
      - PGADMIN_DEFAULT_EMAIL
      - PGADMIN_DEFAULT_PASSWORD
      - VIRTUAL_HOST=${PGADMIN_VIRTUAL_HOST}
      - LETSENCRYPT_HOST=${PGADMIN_LETSENCRYPT_HOST}
      - LETSENCRYPT_EMAIL=${PGADMIN_LETSENCRYPT_EMAIL}
      - PGADMIN_CONFIG_APP_NAME
      - PGADMIN_CONFIG_CONFIG_DATABASE_CONNECTION_POOL_SIZE
      - PGADMIN_CONFIG_SERVER_MODE
      - PGADMIN_CONFIG_DEFAULT_SERVER
      - PGADMIN_CONFIG_DEFAULT_SERVER_PORT
      - PGADMIN_CONFIG_PASSWORD_LENGTH_MIN
      - PGADMIN_CONFIG_MAX_SESSION_IDLE_TIME
      - PGADMIN_CONFIG_CONFIG_DATABASE_URI
      - PGADMIN_CONFIG_ALLOW_SAVE_PASSWORD
      - PGADMIN_CONFIG_MAX_QUERY_HIST_STORED
      - PGADMIN_CONFIG_MAIL_SERVER
      - PGADMIN_CONFIG_MAIL_PORT
      - PGADMIN_CONFIG_MAIL_USE_SSL
      - PGADMIN_CONFIG_MAIL_USE_TLS
      - PGADMIN_CONFIG_MAIL_USERNAME
      - PGADMIN_CONFIG_MAIL_PASSWORD
      - PGADMIN_CONFIG_MAIL_DEBUG
      - PGADMIN_CONFIG_SECURITY_EMAIL_SENDER
      - PGADMIN_CONFIG_ALLOW_SAVE_TUNNEL_PASSWORD
      - PGADMIN_CONFIG_MAX_LOGIN_ATTEMPTS
    networks:
      - internal
    profiles: [$PGADMIN_PROFILES]

  # Live custom-module sync — mounts the same volume as the odoo service at /workspace.
  # git-sync clones CUSTOM_MODULES_REPO and creates /workspace/current -> latest checkout.
  # Odoo reads modules from /workspace/current (included in ADDONS_PATH via SYNC_ADDONS).
  # No image rebuild needed: push to your modules repo and changes appear within SYNC_PERIOD.
  # Webhook endpoint: POST https://your-domain/modules-sync/ (proxied via nginx to port 9000)
  custom-modules-sync:
    image: registry.k8s.io/git-sync/git-sync:${GIT_SYNC_TAG:-v4.2.3}
    # Run as root so it can write to the shared volume regardless of mount permissions
    user: "0:0"
    volumes:
      - custom-modules-data:/workspace
    environment:
      - GITSYNC_REPO=${CUSTOM_MODULES_REPO}
      - GITSYNC_BRANCH=${CUSTOM_MODULES_BRANCH:-main}
      - GITSYNC_ROOT=/workspace
      - GITSYNC_LINK=current
      - GITSYNC_DEPTH=1
      - GITSYNC_PERIOD=${CUSTOM_MODULES_SYNC_PERIOD:-30s}
      # Exposes /metrics and /healthz; also accepts POST /sync for webhook-triggered pulls
      - GITSYNC_HTTP_BIND=:9000
      - GITSYNC_USERNAME=${GITHUB_USER}
      - GITSYNC_PASSWORD=${GITHUB_ACCESS_TOKEN}
    networks:
      - internal
    profiles: [$GIT_SYNC_PROFILES]

volumes:
  odoo-data:
  pg-data:
  redis-data:
  s3-data:
  pgadmin-data:
  html:
  vhost:
  certs:
  acme:
  # Shared between custom-modules-sync (writer) and odoo (reader)
  custom-modules-data:

networks:
  internal:
    driver: bridge
