services:
  odoo:
    restart: 'no'
    volumes:
      # Bind mount local grove-odoo-modules clone for instant code changes.
      # Overrides the git-sync shared volume — no git-sync needed locally.
      - ../grove-odoo-modules:/workspace/current
    ports:
      - 8069:8069
      - 8070:8070
      - 8071:8071
      - 8072:8072

  postgres:
    restart: 'no'
    ports:
      - 5432:5432

  custom-modules-sync:
    restart: 'no'

  nginx:
    restart: 'no'

  nginx-proxy:
    restart: 'no'
    ports:
      - 80:80
      - 443:443

  letsencrypt:
    restart: 'no'

  redis:
    restart: 'no'

  s3:
    restart: 'no'

  pgadmin:
    restart: 'no'
