# gitleaks configuration for odoocker-goldberrygrove
# Uses the default built-in ruleset with project-specific allowlists.
#
# Rules here suppress *known-safe* false positives only.
# Never blanket-ignore a rule class — scope allowlists as tightly as possible.
# Justify each allowlist entry in a commit message when adding or modifying.
#
# Reference: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

title = "gitleaks config — odoocker-goldberrygrove"

# ── Extend the default ruleset ──────────────────────────────────────────────
[extend]
useDefault = true

# ── Global allowlist ─────────────────────────────────────────────────────────
[allowlist]
  description = "Project-level allowlist for known-safe placeholder values"

  # File-level path allowlist
  # These files intentionally contain secrets-shaped placeholder strings
  # (e.g. CHANGE_ME, your-password-here) to guide operators during setup.
  #
  # NB: these are TOML literal strings (triple single quotes), so backslashes
  # are NOT escaped — a single `\.` produces the regex pattern `\.`.
  paths = [
    # Environment variable template files — all values are placeholders
    '''\.env\.example$''',
    '''\.env\.grove\.example$''',
    # Any .env.*.example pattern added in future
    '''\.env\.[^/]+\.example$''',
    # Terraform variable template files. `*.tfvars.example` are placeholder
    # templates only — real *.tfvars are gitignored and secrets flow via
    # TF_VAR_* from 1Password at apply time (see any terraform.tfvars.example
    # header). They intentionally carry secret-shaped placeholders, including
    # `op://` references wrapped in PEM `-----BEGIN/END ... KEY-----` markers
    # that trip the `private-key` rule (surfaced on GOL-293; introduced by the
    # observability RUM cert/key example on GOL-311). Same rationale + treatment
    # as the .env.example entries above.
    '''\.tfvars\.example$''',
    # Test fixtures directory (mock API keys, dummy credentials for unit tests)
    '''tests/fixtures/''',
    '''test/fixtures/''',
  ]

  # Regex-based allowlist for specific placeholder patterns that appear
  # across all files (e.g., in documentation code blocks).
  # These patterns match only obviously non-secret placeholder strings.
  regexes = [
    # Explicit placeholder markers used throughout example files
    '''CHANGE_ME''',
    '''CHANGE[-_]THIS''',
    '''your[-_]password[-_]here''',
    '''your[-_]secret[-_]here''',
    '''your[-_]key[-_]here''',
    '''replace[-_]with[-_]your''',
    '''<YOUR[-_][A-Z_]+>''',
    # Hex placeholder strings used as default values in .env.example
    # (a single hex character repeated 16+ times — clearly not a real key).
    # Backreferences aren't supported by Go's RE2 engine, so each char
    # is enumerated explicitly.
    '''0{16,}|1{16,}|2{16,}|3{16,}|4{16,}|5{16,}|6{16,}|7{16,}|8{16,}|9{16,}|a{16,}|b{16,}|c{16,}|d{16,}|e{16,}|f{16,}''',
  ]

  # Commit allow list (add commit SHAs here if a historical commit contains
  # a known-safe false positive that cannot be rewritten)
  commits = [
    # Inherited from upstream yhaelopez/odoocker fork.
    # odoo/Dockerfile:35 contained ARG GITHUB_ACCESS_TOKEN=ghp_... as a real
    # PAT belonging to the upstream author (committed 2023-04-19). The token
    # has been public in the upstream repo for 2+ years and must be presumed
    # compromised/revoked; rewriting history here would force re-clones across
    # every fork without changing the public exposure. The current Dockerfile
    # has already been refactored to use a build-arg with no default value.
    "6b2571d8051b3fe8eed6f29cb87e0a13fa805456",
  ]

# ── Rule-level overrides ─────────────────────────────────────────────────────
# Add per-rule overrides below if a specific rule fires on a specific file
# that is not covered by the global allowlist above.

# scripts/check-secret-shapes.sh -- the shape-check script literally names the
# expected PEM header ('-----BEGIN OPENSSH PRIVATE KEY-----') so it can probe
# for a matching prefix on the CI SSH secret. That literal appears in one
# variable + one comment. The `private-key` rule matches on this literal;
# gitleaks:allow inline comments only whitelist current content, not history,
# so a rule-scoped path allowlist is what actually works across git history.
[[rules]]
id = "private-key"
[rules.allowlist]
  paths = ['''scripts/check-secret-shapes\.sh$''']
  description = "Shape-check script intentionally names the expected PEM header for its prefix probe."

