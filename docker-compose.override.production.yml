services:
  odoo:
    restart: unless-stopped
    ports:
      - 127.0.0.1:8069:8069
      - 127.0.0.1:8070:8070
      - 127.0.0.1:8071:8071
      - 127.0.0.1:8072:8072
    deploy:
      resources:
        limits:
          # Adjust to your DigitalOcean droplet size.
          # Recommended minimum for 3 businesses + inventory: 4 GB RAM, 2 vCPU
          memory: 2G
        reservations:
          memory: 512M

  postgres:
    restart: unless-stopped
    ports:
      - 127.0.0.1:5432:5432
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

  custom-modules-sync:
    restart: unless-stopped

  nginx:
    restart: unless-stopped

  nginx-proxy:
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443

  letsencrypt:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  s3:
    restart: unless-stopped

  pgadmin:
    restart: unless-stopped
