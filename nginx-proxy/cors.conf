# CORS allowlist — compile-time list, not runtime client-header echo.
#
# Outer proxy (nginx-proxy) tier. The same map lives in nginx/default.conf
# for the inner Odoo nginx; keep them in sync if you add/remove origins.
# See nginx/default.conf for the full rationale.
map $http_origin $cors_allow_origin {
    default "";
    "https://goldberrygrove.farm"         $http_origin;
    "https://www.goldberrygrove.farm"     $http_origin;
    "https://woodworkingeorge.com"        $http_origin;
    "https://www.woodworkingeorge.com"    $http_origin;
    "https://atthegrovenursery.com"       $http_origin;
    "https://www.atthegrovenursery.com"   $http_origin;
    "https://gatheringatthegrove.com"     $http_origin;
    "https://www.gatheringatthegrove.com" $http_origin;
    "http://localhost:3000"               $http_origin;
    "http://localhost:3001"               $http_origin;
    "http://localhost:3002"               $http_origin;
    "http://localhost:3003"               $http_origin;
}

server {
    server_name $VIRTUAL_HOST;
    listen 443;
    location / {
        # `Vary: Origin` always — outside the `if` — so shared caches
        # don't poison an allowed-origin response with a disallowed one.
        add_header 'Vary' 'Origin' always;

        if ($cors_allow_origin) {
            add_header 'Access-Control-Allow-Origin' $cors_allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Vary' 'Origin' always;
        }

        # OPTIONS preflight: CORS headers MUST be restated here. nginx
        # treats each `if` as its own context — the add_headers from the
        # cors_allow_origin block don't propagate to this sibling block.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Vary' 'Origin' always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }
    }
}
