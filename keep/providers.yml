# Keep provider definitions — Discord webhooks for Grove notifications.
#
# Consumed by scripts/setup-monitoring.py which POSTs each provider to Keep's
# `POST /providers/install` endpoint (Keep 0.54.1, API at ROOT, X-API-KEY auth).
#
# IMPORTANT (GOL-278): Keep's install body puts the provider config fields at the
# TOP LEVEL — for a discord provider that is a top-level `webhook_url`, NOT nested
# under `provider_config`/`authentication`. The script builds:
#   {provider_id, provider_name, provider_type, webhook_url}
# Verified: both discord-warning + discord-critical install this way.
#
# Webhook URLs are NOT stored here. Each provider names the env var that holds its
# webhook (resolved at bootstrap from .env.monitoring / 1Password), so no secret
# ever lands in the repo.
#
# Two separate Discord webhooks (one per channel) because Discord's webhook →
# channel binding is fixed at webhook creation.
#
# NB (GOL-278): installing these providers is COMPLEMENTARY — it populates Keep's
# provider inventory/UI, but the routing workflows in keep/workflows/ do NOT
# reference them. Keep 0.54.1's API-installed provider references
# ("{{ providers.<name> }}") are unreliable (UUID ids, null provider_id, and
# soft-delete name residue that 409s reinstalls), so the workflows configure the
# discord webhook INLINE instead (config.authentication.webhook_url, injected at
# upload from the same env var). `provider_name` is still a clean slug for a tidy
# Keep UI. If a future Keep version makes provider references dependable, the
# workflows can switch to "{{ providers.discord-warning }}" with no change here.
providers:
  # → #grove-alerts-warning (workflow: keep/workflows/route-warning.yml, inline webhook)
  - provider_id: discord-warning
    provider_type: discord
    provider_name: discord-warning
    webhook_url_env: DISCORD_WEBHOOK_WARNING

  # → #grove-alerts-critical (workflow: keep/workflows/route-critical.yml, inline webhook)
  - provider_id: discord-critical
    provider_type: discord
    provider_name: discord-critical
    webhook_url_env: DISCORD_WEBHOOK_CRITICAL
