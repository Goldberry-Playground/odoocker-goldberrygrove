# Grove OTel Collector — USE / infrastructure metrics → OpenObserve.
#
# Ships the "how hard is each resource working" half of CostOps rightsizing
# (spec §3 / §6): host CPU/RAM/disk/network + per-container CPU/RAM, joined in
# OpenObserve with the cost-bridge's cost_resource_* to flag cost × idle.
#
# Runs on the app/Odoo droplet (where /proc + the Docker socket live). The
# frontends are on App Platform (no docker_stats there) — their USE metrics come
# from the DO-metrics bridge (do-metrics/, polls the DO Monitoring API).
#
# LIVE VALIDATED (GOL-312, 2026-07-12): basic hostmetrics land as system_cpu_time
# (cumulative counter) + system_filesystem_usage / system_memory_usage (bytes).
# The alerts reference system_cpu_utilization / system_filesystem_utilization /
# system_memory_utilization — these are OPTIONAL otelcol metrics, enabled below.

extensions:
  basicauth/openobserve:
    client_auth:
      username: ${env:OPENOBSERVE_ROOT_EMAIL}
      password: ${env:OPENOBSERVE_ROOT_PASSWORD}

receivers:
  # OTLP in — receives RED metrics + traces from Beyla (agent → collector →
  # backend). Internal network, no auth needed here; the Collector's exporter
  # adds OpenObserve auth downstream.
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Host CPU/RAM/disk/filesystem/network. root_path=/hostfs reads the host's
  # /proc + /sys mounted read-only by the compose service.
  hostmetrics:
    collection_interval: 30s
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          # Enable the 0-1 utilization gauge (optional; default=disabled).
          # Emits system_cpu_utilization stream — what the droplet-cpu alerts query.
          system.cpu.utilization:
            enabled: true
      load:
      memory:
        metrics:
          # Enable memory utilization ratio (optional; default=disabled).
          system.memory.utilization:
            enabled: true
      disk:
      filesystem:
        metrics:
          # Enable filesystem utilization ratio (optional; default=disabled).
          # Emits system_filesystem_utilization — what the disk-data alerts query.
          system.filesystem.utilization:
            enabled: true
      network:
  # Per-container CPU% + memory% (of limit) via the Docker socket.
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 30s
    metrics:
      container.cpu.utilization:
        enabled: true
      container.memory.percent:
        enabled: true

  # ── OPTIONAL: Postgres USE (connections) ───────────────────────────────────
  # The `postgresql` receiver is defined in the app-plane overlay fragment
  # otelcol-config.postgres.yaml, NOT here — it is merged via a second --config
  # ONLY on ADR-007 app-plane collectors (which have a Managed PG). Keeping it
  # out of this shared base means an unset POSTGRES_* can never fail the
  # obs-plane / local full-stack collectors' startup. See otel/README.md +
  # docker-compose.monitoring.app-plane.yml (GOL-335).

processors:
  batch:
    timeout: 10s
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:COST_ENV}
        action: upsert
      - key: host.role
        value: odoo-droplet
        action: upsert

exporters:
  otlphttp/openobserve:
    endpoint: ${env:OPENOBSERVE_OTLP_BASE}
    auth:
      authenticator: basicauth/openobserve

service:
  extensions: [basicauth/openobserve]
  pipelines:
    metrics:
      receivers: [hostmetrics, docker_stats, otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/openobserve]
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/openobserve]
  telemetry:
    logs:
      level: info
