###############################################################################
# Grove Multi-Tenant Ecosystem — Ghost CMS Services
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.override.grove.yml up
###############################################################################

# Ghost image is pinned by content-addressable SHA256 digest below. There
# is no GHOST_TAG env var because all three tenants share the same image
# and tenant differs only by `url` + port. To upgrade Ghost, re-run
# `docker buildx imagetools inspect ghost:5-alpine` and update all three
# `image:` lines together. See .env.example "Containers' Tags" for the
# supply-chain-hardening rationale.
services:
  ghost-goldberry:
    image: ghost:5-alpine@sha256:a0506f3f05f5bdc6c950c5113cdcdb1e1f96fbf15f6dc0a39fc093c25348bdb5
    restart: unless-stopped
    environment:
      url: ${GHOST_GOLDBERRY_URL}
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      NODE_ENV: production
    volumes:
      - ghost-goldberry-data:/var/lib/ghost/content
    expose:
      - "2368"
    networks:
      - internal

  ghost-ggg:
    image: ghost:5-alpine@sha256:a0506f3f05f5bdc6c950c5113cdcdb1e1f96fbf15f6dc0a39fc093c25348bdb5
    restart: unless-stopped
    environment:
      url: ${GHOST_GGG_URL}
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      NODE_ENV: production
      server__port: "2369"
    volumes:
      - ghost-ggg-data:/var/lib/ghost/content
    expose:
      - "2369"
    networks:
      - internal

  ghost-nursery:
    image: ghost:5-alpine@sha256:a0506f3f05f5bdc6c950c5113cdcdb1e1f96fbf15f6dc0a39fc093c25348bdb5
    restart: unless-stopped
    environment:
      url: ${GHOST_NURSERY_URL}
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      NODE_ENV: production
      server__port: "2370"
    volumes:
      - ghost-nursery-data:/var/lib/ghost/content
    expose:
      - "2370"
    networks:
      - internal

volumes:
  ghost-goldberry-data:
  ghost-ggg-data:
  ghost-nursery-data:
