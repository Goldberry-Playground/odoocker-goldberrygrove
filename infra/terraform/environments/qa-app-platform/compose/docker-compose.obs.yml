# Observability stack for the Level 3 obs droplet.
#
# Adapted from the canonical docker-compose.monitoring.yml at the repo root.
# Key differences:
#   - MinIO runs INLINE on this droplet (not on the Odoo droplet's network
#     via `gatheratthegrove_internal: external: true` like the local stack).
#     This is the ADR-007 addendum decision for QA - bundle MinIO for low
#     volume, defer the swap to DO Spaces until prod or sustained volume
#     warrants the +$5/mo.
#   - Caddy is added in front of both UIs for TLS (admin-only at the
#     firewall layer; Caddy handles cert issuance via the same DO DNS-01
#     plugin the Odoo droplet uses).

services:
  # -- MinIO - Parquet storage for OpenObserve -------------------------------
  # Single-node, single-user. ~200MB RAM, ~50MB image. Data persists in a
  # named volume; on droplet recreate the data is lost (acceptable for QA
  # observability - alert history isn't load-bearing across droplet
  # lifecycle). Swap for DO Spaces if data persistence matters.
  s3:
    image: quay.io/minio/minio:${MINIO_TAG:-RELEASE.2025-04-22T22-12-26Z}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # -- MinIO bucket bootstrap - create the openobserve-data bucket on first run
  # Idempotent: mc mb -p succeeds whether or not the bucket already exists.
  # Without this, OpenObserve's first Parquet write would fail with
  # "bucket does not exist".
  s3-init:
    image: quay.io/minio/mc:${MC_TAG:-RELEASE.2025-04-16T18-13-26Z}
    depends_on:
      s3:
        condition: service_healthy
    environment:
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@s3:9000
    entrypoint: |
      sh -c "
        mc mb -p local/openobserve-data || true
        echo '[ok] openobserve-data bucket ready'
      "
    networks:
      - internal
    restart: "no"

  # -- OpenObserve - single-binary observability platform --------------------
  # Synthetic HTTP monitors, native alerting (built-in Discord output),
  # logs/metrics/traces ingestion via OTLP, Parquet-on-S3 storage.
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:${OPENOBSERVE_TAG}
    restart: unless-stopped
    depends_on:
      s3:
        condition: service_healthy
      s3-init:
        condition: service_completed_successfully
    environment:
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_ROOT_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_ROOT_PASSWORD}
      ZO_S3_PROVIDER: s3
      ZO_S3_SERVER_URL: http://s3:9000
      ZO_S3_REGION_NAME: us-east-1
      ZO_S3_BUCKET_NAME: openobserve-data
      ZO_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      ZO_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ZO_S3_FORCE_PATH_STYLE: "true"
      ZO_TELEMETRY: "false"
      ZO_PROMETHEUS_ENABLED: "true"
      ZO_LOCAL_MODE: "true"
    expose:
      - "5080"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # -- Keep - alert routing + workflow engine --------------------------------
  keep-backend:
    image: us-central1-docker.pkg.dev/keephq/keep/keep-api:${KEEP_TAG}
    restart: unless-stopped
    environment:
      DATABASE_CONNECTION_STRING: sqlite:////app/data/keep.db
      AUTH_TYPE: NO_AUTH
      KEEP_API_URL: http://keep-backend:8080
      PORT: 8080
      WEBHOOK_TOKEN: ${KEEP_WEBHOOK_TOKEN}
      FRONTEND_URL: https://keep.${QA_ZONE}
    volumes:
      - keep-data:/app/data
    expose:
      - "8080"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  keep-frontend:
    image: us-central1-docker.pkg.dev/keephq/keep/keep-ui:${KEEP_TAG}
    restart: unless-stopped
    depends_on:
      keep-backend:
        condition: service_healthy
    environment:
      API_URL: http://keep-backend:8080
      NEXTAUTH_SECRET: ${KEEP_NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://keep.${QA_ZONE}
      NEXT_PUBLIC_API_URL: https://keep.${QA_ZONE}/api
      AUTH_TYPE: NO_AUTH
    expose:
      - "3000"
    networks:
      - internal

  # -- Caddy - TLS for the two UIs -------------------------------------------
  # Same grove-caddy image the Odoo droplet uses (DO DNS-01 plugin baked in).
  caddy:
    image: ghcr.io/goldberry-playground/grove-caddy:${CADDY_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/grove-obs/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DO_API_TOKEN: ${DO_API_TOKEN}
      ACME_CA: ${ACME_CA}
    networks:
      - internal
    depends_on:
      openobserve:
        condition: service_healthy
      keep-frontend:
        condition: service_started

networks:
  internal:
    driver: bridge

volumes:
  minio-data:
  keep-data:
  caddy-data:
  caddy-config:
