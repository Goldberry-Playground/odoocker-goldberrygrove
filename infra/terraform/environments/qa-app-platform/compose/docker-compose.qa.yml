# docker-compose for the Level 3 QA Odoo droplet.
#
# DIFFERS FROM THE MONOLITH QA (environments/qa/compose/docker-compose.qa.yml):
#   - NO postgres service (offloaded to DO Managed PG; Odoo connects via env)
#   - NO frontend services (moved to DO App Platform - Phase 2)
#   - ONE Caddy site (just Odoo) - no per-tenant routing
#
# Three services: caddy (TLS termination + reverse proxy to odoo), odoo,
# and custom-modules-sync (git-sync sidecar). The grove-odoo image does NOT
# bake in the grove-odoo-modules repo -- its Dockerfile only clones
# third-party addons. Custom modules (grove_headless et al.) arrive the
# same way production gets them: git-sync writes /workspace/current on a
# shared volume, and ADDONS_PATH (in /etc/grove/.env) includes it.
# Discovered 2026-07-05: the first L3 boot ran --init=base with an EMPTY
# addons_path because nothing delivered the modules and ADDONS_PATH was
# unset -- grove_headless was invisible to ir.module.module.
# Postgres health-gate (PR #129) is irrelevant here - Odoo connects to
# Managed PG over private VPC network; that connection is always ready
# before Odoo starts.

services:
  caddy:
    image: ghcr.io/goldberry-playground/grove-caddy:${CADDY_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/grove/Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/caddy-data:/data         # Persistent LE certs + ACME account (volume bind)
      - caddy-config:/config           # Caddy's own state (not certs)
    environment:
      DO_API_TOKEN: ${DO_API_TOKEN}    # DNS-01 ACME challenge under qa-l3 zone
      ACME_CA: ${ACME_CA}              # LE prod or staging - set in /etc/grove/.env
    networks:
      - grove
    depends_on:
      odoo:
        condition: service_started

  odoo:
    image: ghcr.io/goldberry-playground/grove-odoo:${ODOO_TAG:-latest}
    restart: unless-stopped
    expose:
      - "8069"
      - "8072"   # longpolling
    environment:
      HOST: ${DB_HOST}
      PORT: ${DB_PORT}
      USER: ${DB_USER}
      PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      ADMIN_PASSWD: ${ODOO_ADMIN_PASSWORD}
      # Mode selector for the image's entrypoint dispatcher. REQUIRED: with
      # APP_ENV unset every branch test errors ("unary operator expected"),
      # nothing execs, and the container restart-loops on exit 1. The 'qa'
      # branch is purpose-built for this env: --init=base bootstraps a fresh
      # Managed-PG database on first boot and no-ops afterwards; no
      # --update=all on restarts. Discovered 2026-07-04 -- the first L3
      # droplet only ever ran via hand-applied fixes, so this compose had
      # never actually booted Odoo unassisted.
      APP_ENV: qa
      # PROXY_MODE=true tells Odoo to trust X-Forwarded-* headers (which
      # Caddy sets). Without this, Odoo's CSRF + URL generation breaks
      # when behind a reverse proxy.
      PROXY_MODE: "true"
      LIST_DB: "false"   # hide the DB selector since we have one fixed DB
    volumes:
      - odoo-filestore:/var/lib/odoo
      # LOAD-BEARING (2026-07-04): the grove-odoo image's entrypoint runs
      # /odoorc.sh (which substitutes the literal placeholder strings in
      # /etc/odoo/odoo.conf) ONLY when /.env exists in the container.
      # Without this mount Odoo crash-loops on a raw dollar-brace DB_PORT
      # ("invalid integer value"). The monolith compose carried this mount;
      # this env's first droplet was hand-patched instead, and the fix
      # evaporated on the first recreate. Same lesson, now in code.
      - /etc/grove/.env:/.env:ro
      # Custom modules delivered by the custom-modules-sync sidecar below.
      # ADDONS_PATH (set in /etc/grove/.env, substituted into odoo.conf by
      # odoorc.sh at container start) must include /workspace/current.
      - custom-modules-data:/workspace:ro
    networks:
      - grove
    depends_on:
      # service_started only -- git-sync has no shell for a healthcheck.
      # If odoo wins the race before /workspace/current exists, it exits
      # and `restart: unless-stopped` retries until the first sync lands
      # (seconds; the repo is small and cloned --depth 1).
      custom-modules-sync:
        condition: service_started

  # Same delivery mechanism as production's custom-modules-sync: git-sync
  # clones grove-odoo-modules and maintains /workspace/current -> latest.
  # The repo is PUBLIC, so no GITSYNC_USERNAME/PASSWORD here -- keep it
  # that way; /etc/grove/.env is mode 0644 and must stay credential-light.
  custom-modules-sync:
    image: registry.k8s.io/git-sync/git-sync:${GIT_SYNC_TAG:-v4.2.3@sha256:19cc7c317d125c5737ecb9a9159d00b5d97f39c45225c6483de365d62fc09fa8}
    restart: unless-stopped
    # Run as root so it can write to the shared volume regardless of mount
    # permissions (matches the production service).
    user: "0:0"
    volumes:
      - custom-modules-data:/workspace
    environment:
      - GITSYNC_REPO=${CUSTOM_MODULES_REPO:-https://github.com/Goldberry-Playground/grove-odoo-modules.git}
      - GITSYNC_REF=${CUSTOM_MODULES_REF:-main}
      - GITSYNC_ROOT=/workspace
      - GITSYNC_LINK=current
      - GITSYNC_DEPTH=1
      - GITSYNC_PERIOD=${CUSTOM_MODULES_SYNC_PERIOD:-60s}
    networks:
      - grove

networks:
  grove:
    driver: bridge

volumes:
  caddy-config:
  odoo-filestore:
  # Shared between custom-modules-sync (writer) and odoo (reader)
  custom-modules-data:
