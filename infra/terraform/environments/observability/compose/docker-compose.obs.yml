###############################################################################
# Standalone observability stack for the obs droplet — OpenObserve + Keep.
#
# Differs from the app-plane docker-compose.monitoring.yml: this is SELF-
# CONTAINED (its own network, no shared gatheratthegrove_internal, no MinIO)
# because the obs droplet is a separate plane. OpenObserve writes Parquet to
# DO Spaces (S3-compatible) instead of the app-stack MinIO — the ZO_S3_* values
# come from cloud-init (.env) so nothing is hardcoded to the app plane.
#
# The synthetic-runner / cost-bridge do NOT run here — they run on the app plane
# and ship OTLP to this droplet's :5080 (see the observability env README for
# the cross-plane ingest wiring, which needs live setup).
###############################################################################

name: grove-obs

networks:
  obs:
    driver: bridge

services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:${OPENOBSERVE_TAG:-v0.17.2}
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_ROOT_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_ROOT_PASSWORD}
      # Parquet → DO Spaces (S3). Only these differ from the app-plane MinIO
      # config; everything else travels unchanged.
      ZO_S3_PROVIDER: s3
      ZO_S3_SERVER_URL: ${ZO_S3_SERVER_URL}
      ZO_S3_REGION_NAME: ${ZO_S3_REGION_NAME:-us-east-1}
      ZO_S3_BUCKET_NAME: ${ZO_S3_BUCKET_NAME}
      ZO_S3_ACCESS_KEY: ${ZO_S3_ACCESS_KEY}
      ZO_S3_SECRET_KEY: ${ZO_S3_SECRET_KEY}
      ZO_S3_FORCE_PATH_STYLE: "true"
      ZO_TELEMETRY: "false"
      ZO_PROMETHEUS_ENABLED: "true"
      ZO_LOCAL_MODE: "true"
    ports:
      - "5080:5080"
    networks:
      - obs
    # No container healthcheck: the OpenObserve image is fully distroless (no
    # sh/wget/curl/python), so any exec-based healthcheck can never run and
    # Docker reports the container "unhealthy" even while /healthz returns 200
    # (this false status misled the GOL-277 bring-up). Liveness is monitored
    # externally via /healthz (setup-monitoring + the agenticos synthetic runner).

  # One-shot: make the keep-data volume writable by the keep container user.
  # The keep-api image runs as uid/gid 1000 (keep), but a fresh named volume is
  # created root-owned (0755), so keep-api cannot create /app/data/keep.db and
  # crash-loops with "sqlite3.OperationalError: unable to open database file"
  # (the GOL-277 root cause). This init chowns the volume before keep-backend
  # starts. Idempotent — safe to re-run on every `compose up`.
  keep-init:
    image: busybox:1.36
    command: ["sh", "-c", "chown -R 1000:1000 /app/data"]
    volumes:
      - keep-data:/app/data
    networks:
      - obs
    restart: "no"

  keep-backend:
    image: us-central1-docker.pkg.dev/keephq/keep/keep-api:${KEEP_TAG:-latest}
    restart: unless-stopped
    depends_on:
      keep-init:
        condition: service_completed_successfully
    environment:
      DATABASE_CONNECTION_STRING: sqlite:////app/data/keep.db
      AUTH_TYPE: NO_AUTH
      KEEP_API_URL: http://keep-backend:8080
      PORT: 8080
      WEBHOOK_TOKEN: ${KEEP_WEBHOOK_TOKEN}
      FRONTEND_URL: http://localhost:3034
    volumes:
      - keep-data:/app/data
    networks:
      - obs
    # CMD-SHELL (not exec CMD): the exec form passes "||", "exit", "1" as literal
    # argv to wget, so the check always failed and the container showed
    # "unhealthy" despite /healthcheck returning 200. keep-api has sh + wget.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  keep-frontend:
    image: us-central1-docker.pkg.dev/keephq/keep/keep-ui:${KEEP_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - keep-backend
    environment:
      API_URL: http://keep-backend:8080
      NEXTAUTH_SECRET: ${KEEP_NEXTAUTH_SECRET:-changeme}
      NEXTAUTH_URL: http://localhost:3034
      NEXT_PUBLIC_API_URL: http://keep-backend:8080
      AUTH_TYPE: NO_AUTH
    ports:
      - "3034:3000"
    networks:
      - obs

volumes:
  keep-data:
