# Grove QA -- full compose stack for the QA droplet.
#
# Inlined by Terraform's templatefile() into cloud-init at droplet provision
# time. Image tags + secrets come from /etc/grove/.env (also written by cloud-init).
#
# Differences from preview:
#   - No Ghost containers (frontends point at live blog.goldberrygrove.farm
#     via GHOST_KEY_GOLDBERRY or gracefully degrade to empty)
#   - No snapshot restore (fresh empty Postgres on every droplet creation)
#   - All volumes anonymous -- QA is ephemeral, data lost on droplet teardown
#
# TLS: Caddy via DO DNS-01 wildcard. ONE cert for apex + *.qa.* (mirror of
# preview env's pattern). Eliminates LE's per-identifier rate limit (the
# bug that bit us on 2026-06-25 with HTTP-01 + 5 distinct identifiers --
# see git log for the PR #81 -> PR #82 history).

name: grove-qa

services:
  # -- Caddy -- TLS + reverse proxy for all qa-* subdomains -------------------
  # Pre-built by .github/workflows/docker-caddy.yml from caddy.Dockerfile
  # (xcaddy build w/ github.com/caddy-dns/digitalocean baked in), pushed to
  # ghcr.io/goldberry-playground/grove-caddy. DO_API_TOKEN flows from
  # cloud-init's /etc/grove/.env and lets Caddy write _acme-challenge TXT
  # records during DNS-01 issuance.
  #
  # History: PR #82 referenced `slothcored/caddy:digitalocean` (Docker Hub
  # 404). PR #84 switched to on-droplet `build:`. This PR moved the build to
  # CI so (a) GHCR preflight catches breakage BEFORE droplet boots, (b) the
  # per-droplet ~30s xcaddy build goes away, (c) the Dockerfile + token no
  # longer have to be plumbed through cloud-init.
  caddy:
    image: ghcr.io/goldberry-playground/grove-caddy:${CADDY_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"   # ACME HTTP-01 fallback + 80->443 redirect; not load-bearing
      - "443:443"
    volumes:
      - /etc/grove/Caddyfile:/etc/caddy/Caddyfile:ro
      # /data persists ACROSS droplet teardowns via a DO block-storage volume
      # mounted at /mnt/caddy-data by cloud-init's `mounts:` module. The TF
      # env declares the volume + attachment; once Caddy has issued a cert,
      # subsequent droplet recreates re-attach the same volume and Caddy
      # finds the existing cert -- no fresh ACME call, no LE rate-limit risk.
      - /mnt/caddy-data:/data
      - caddy-config:/config
    environment:
      QA_ZONE: ${QA_ZONE}
      # DO API token for DNS-01 ACME challenge. Same token TF uses (domain:write
      # scope is what's needed for _acme-challenge record writes). Caddy reads
      # via {env.DO_API_TOKEN} in the Caddyfile's `tls { dns digitalocean ... }`
      # directive. SECURITY: this token is now readable inside the caddy container's
      # env block (and by anything with root on the droplet via `docker inspect`).
      # That's acceptable because (a) droplet is single-tenant single-operator,
      # (b) the token is already in /etc/grove/.env (same blast radius).
      DO_API_TOKEN: ${DO_API_TOKEN}
      # ACME directory URL. LE prod by default (real certs); staging when
      # iterating heavily (no rate limits, browser warnings). Caddy reads
      # via {env.ACME_CA} in the Caddyfile global block.
      ACME_CA: ${ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}

  # -- Postgres -- fresh on every QA droplet creation -------------------------
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: grove_qa
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d grove_qa"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -- Odoo backend ---------------------------------------------------------
  odoo:
    image: ghcr.io/goldberry-playground/grove-odoo:${ODOO_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: odoo
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Name must match the placeholder in the grove-odoo image's /odoo.conf
      # template -- it expects ADMIN_PASSWD (no "OR"). odoorc.sh runs `set -e`
      # so a missing var aborts the WHOLE substitution mid-flight, leaving
      # other placeholders un-substituted and Odoo crashing on literal DB_PORT.
      ADMIN_PASSWD: ${ODOO_ADMIN_PASSWORD}
      APP_ENV: qa
      WORKERS: "2"
      LIST_DB: "false"
    volumes:
      - odoo-filestore:/var/lib/odoo
      # The grove-odoo image's entrypoint.sh runs /odoorc.sh (the template
      # substitution script) ONLY if /.env exists in the container. odoorc.sh
      # then reads /.env and substitutes the ${VAR} placeholders in /odoo.conf
      # (DB_PORT, DB_HOST, ADMIN_PASSWD, etc.) into real values. Without this
      # bind-mount, /etc/odoo/odoo.conf ships with literal "${DB_PORT}" and
      # Odoo crashes at startup with "invalid integer value '${DB_PORT}'".
      # Verified 2026-06-24 by inspecting the image entrypoint chain.
      - /etc/grove/.env:/.env:ro

  # -- Frontends -------------------------------------------------------------
  hub:
    image: ghcr.io/goldberry-playground/grove-hub:${HUB_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_QA_BANNER: "QA Environment"
      # Hub's marketplace.ts reads process.env.GROVE_ODOO_URL (not ODOO_URL
      # like tenants do; not ODOO_API_URL which doesn't exist in grove-sites).
      GROVE_ODOO_URL: http://odoo:8069
      # Hub journal pages (apps/hub/app/journal/*.tsx) use HUB_GHOST_URL +
      # HUB_GHOST_CONTENT_API_KEY -- intentionally namespaced as hub-specific
      # so the hub can pull editorial content from a designated Ghost
      # instance independent of any tenant's blog. Note "_API_" in the
      # key name (different from tenants' GHOST_CONTENT_KEY).
      # Points at the QA-local ghost-goldberry container (Phase C, 2026-07-01)
      # so hub's editorial pull doesn't couple QA to prod goldberrygrove.farm.
      # Content keys are seeded per-droplet via scripts/setup_ghost_integration.py
      # after first boot -- see docs/GHOST.md.
      HUB_GHOST_URL: http://ghost-goldberry:2368
      HUB_GHOST_CONTENT_API_KEY: ${GHOST_KEY_GOLDBERRY:-qa-stub-no-ghost-key-yet}

  # Tenants' tenant.secrets.ts uses requireEnv() which THROWS in production
  # on empty/missing values (not just missing). Empty defaults in source
  # are dev-only -- production startup fails closed with "Refusing to start
  # to avoid unauthenticated backend calls." So every required env var
  # must be non-empty even when the upstream service (Odoo API key, Ghost)
  # isn't ready yet. Use the qa-stub-* sentinel below for placeholders --
  # easy to grep, obviously not a real credential.

  goldberry:
    image: ghcr.io/goldberry-playground/grove-goldberry:${GOLDBERRY_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_QA_BANNER: "QA Environment"
      # Tenants' tenant.secrets.ts reads process.env.ODOO_URL (not the hub's
      # GROVE_ODOO_URL, not ODOO_API_URL which doesn't exist in grove-sites).
      ODOO_URL: http://odoo:8069
      # No real Odoo API key for QA yet; placeholder satisfies requireEnv().
      # Calls to Odoo authenticated endpoints will fail at runtime until a
      # real key is issued and seeded into Infisical / .env.
      ODOO_API_KEY: qa-stub-no-odoo-api-key-yet
      # Phase C (2026-07-01): points at QA-local ghost-goldberry container.
      # Content key is seeded after first boot via setup_ghost_integration.py
      # + `infisical secrets set GHOST_KEY_GOLDBERRY=...`; falls back to stub
      # so requireEnv() passes on a fresh droplet before the seed step runs.
      GHOST_URL: http://ghost-goldberry:2368
      GHOST_CONTENT_KEY: ${GHOST_KEY_GOLDBERRY:-qa-stub-no-ghost-key-yet}

  ggg:
    image: ghcr.io/goldberry-playground/grove-ggg:${GGG_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_QA_BANNER: "QA Environment"
      ODOO_URL: http://odoo:8069
      ODOO_API_KEY: qa-stub-no-odoo-api-key-yet
      # Phase C (2026-07-01): points at QA-local ghost-ggg container.
      # Same seed flow as goldberry (see docs/GHOST.md).
      GHOST_URL: http://ghost-ggg:2369
      GHOST_CONTENT_KEY: ${GHOST_KEY_GGG:-qa-stub-no-ghost-key-yet}

  nursery:
    image: ghcr.io/goldberry-playground/grove-nursery:${NURSERY_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_QA_BANNER: "QA Environment"
      ODOO_URL: http://odoo:8069
      ODOO_API_KEY: qa-stub-no-odoo-api-key-yet
      # Phase C (2026-07-01): points at QA-local ghost-nursery container.
      # Same seed flow as goldberry (see docs/GHOST.md).
      GHOST_URL: http://ghost-nursery:2370
      GHOST_CONTENT_KEY: ${GHOST_KEY_NURSERY:-qa-stub-no-ghost-key-yet}

  # -- Ghost CMS instances (one per tenant) -----------------------------------
  # Phase C, 2026-07-01: split the previous "one Ghost per QA droplet" model
  # into three, mirroring what local + sandbox have had via override.grove.yml.
  # SQLite backend + a per-tenant Docker volume; ephemeral (dies with the
  # droplet, which is the intended QA behavior -- content is for testing,
  # not for keeps). Ports internal only; the storefronts talk to Ghost over
  # the default grove-qa_default network via container hostname + Content API.
  # Public HTTPS is intentionally NOT exposed -- Caddy has no Ghost vhost.
  # Image is pinned by digest to match local + sandbox for uniformity.
  ghost-goldberry:
    image: ghost:5-alpine@sha256:a0506f3f05f5bdc6c950c5113cdcdb1e1f96fbf15f6dc0a39fc093c25348bdb5
    restart: unless-stopped
    environment:
      url: http://ghost-goldberry:2368
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      NODE_ENV: production
    volumes:
      - ghost-goldberry-data:/var/lib/ghost/content
    expose:
      - "2368"

  ghost-ggg:
    image: ghost:5-alpine@sha256:a0506f3f05f5bdc6c950c5113cdcdb1e1f96fbf15f6dc0a39fc093c25348bdb5
    restart: unless-stopped
    environment:
      url: http://ghost-ggg:2369
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      NODE_ENV: production
      server__port: "2369"
    volumes:
      - ghost-ggg-data:/var/lib/ghost/content
    expose:
      - "2369"

  ghost-nursery:
    image: ghost:5-alpine@sha256:a0506f3f05f5bdc6c950c5113cdcdb1e1f96fbf15f6dc0a39fc093c25348bdb5
    restart: unless-stopped
    environment:
      url: http://ghost-nursery:2370
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      NODE_ENV: production
      server__port: "2370"
    volumes:
      - ghost-nursery-data:/var/lib/ghost/content
    expose:
      - "2370"

  # -- qa_portal Postgres ------------------------------------------------------
  # Co-located DB for the QA portal app. ISOLATED from the main grove network:
  # joins ONLY qa_portal_net, so odoo/postgres/frontends cannot reach it. The
  # portal app (deployed separately) joins qa_portal_net to connect at host
  # `qa_portal_pg`. No host port published (intentional -- unreachable from
  # outside the droplet). Password rotates per droplet recreate; qa-deploy.yml
  # reads the value after grove-ready and pushes the constructed
  # postgresql://... URL to Infisical at grove-odoo/prod/qa-portal/.
  qa_portal_pg:
    image: postgres:16
    container_name: qa_portal_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: qa_portal
      POSTGRES_USER: qa_portal_app
      POSTGRES_PASSWORD: ${QA_PORTAL_PG_PASSWORD}
    volumes:
      - qa_portal_pgdata:/var/lib/postgresql/data
    networks:
      - qa_portal_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_portal_app -d qa_portal"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  default:
    name: grove-qa_default   # implicit network for the main stack (existing behavior)
  qa_portal_net:
    name: qa_portal_net      # explicit name (no project prefix) so the portal
                             # app's compose can join via `external: true` with
                             # the same literal name

volumes:
  caddy-data:    # LE account + certs; per-droplet (dies with droplet)
  caddy-config:
  postgres-data:
  odoo-filestore:
  qa_portal_pgdata:
  # Ephemeral per Phase C -- Ghost content resets on droplet recreate. When we
  # need durability, move these onto the same block volume that hosts caddy-data
  # (see docs/ADR/005-qa-cert-resilience-stack.md for the pattern).
  ghost-goldberry-data:
  ghost-ggg-data:
  ghost-nursery-data:
