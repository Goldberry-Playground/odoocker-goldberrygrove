# GOL-54 P1 — Standalone OTel Collector for the AgenticOS droplet (DO id 572389418, nyc1).
#
# Self-contained on purpose: this is NOT part of the odoocker stack and joins NO shared
# network. It runs beside whatever compose project the AgenticOS box already runs, reads
# host /proc + the Docker socket read-only, and pushes OTLP metrics OUT to the obs-droplet.
# Independent host → no circular dependency (Grove Observability design §5).
#
# DEPLOY (on the AgenticOS host, after the P0/GOL-53 access grant lands — see README.md):
#   1. Copy infra/agenticos/{otelcol-agenticos-config.yaml,.env.agenticos-otel} to the box.
#   2. Fill .env.agenticos-otel (OPENOBSERVE_OTLP_BASE + creds + COST_ENV).
#   3. docker compose --env-file .env.agenticos-otel \
#        -f docker-compose.agenticos-otel.yml up -d
#   4. Verify: docker logs agenticos-otel-collector  (no exporter errors)
#      then confirm host_role="agenticos" rows land in obs-droplet OpenObserve.
#
# ROLLBACK: docker compose -f docker-compose.agenticos-otel.yml down
#   (removing it stops shipping metrics; the DO-native alerts from P0 remain as the
#    redundant fast layer, so the box is never unmonitored.)

name: agenticos-observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTELCOL_TAG:-0.115.0}
    container_name: agenticos-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    # Small footprint + its OWN mem ceiling: the observability agent must never be the
    # thing that OOMs the box it is watching (defeats the whole purpose).
    mem_limit: 200m
    mem_reservation: 64m
    environment:
      OPENOBSERVE_OTLP_BASE: ${OPENOBSERVE_OTLP_BASE:?set to the obs-droplet OpenObserve OTLP base, e.g. https://obs.gatheringatthegrove.com/api/default}
      OPENOBSERVE_ROOT_EMAIL: ${OPENOBSERVE_ROOT_EMAIL:?obs-droplet OpenObserve ingest user}
      OPENOBSERVE_ROOT_PASSWORD: ${OPENOBSERVE_ROOT_PASSWORD:?obs-droplet OpenObserve ingest password}
      COST_ENV: ${COST_ENV:-agenticos}
    volumes:
      - ./otelcol-agenticos-config.yaml:/etc/otelcol/config.yaml:ro
      - /:/hostfs:ro                              # host CPU/RAM/disk/swap via hostmetrics
      - /var/run/docker.sock:/var/run/docker.sock:ro   # per-container CPU/RAM via docker_stats
    healthcheck:
      # The collector exposes 13133 only if the health_check extension is enabled; we keep
      # the config minimal, so use a cheap process liveness probe instead.
      test: ["CMD", "sh", "-c", "ps aux | grep -v grep | grep -q otelcol || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
