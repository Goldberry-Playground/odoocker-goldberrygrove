# ZAP Baseline Scan Rule Configuration
# Format: <rule-id> <action> [# optional comment]
# Actions:
#   IGNORE  — do not report the alert at all
#   WARN    — report as warning (workflow does not fail)
#   FAIL    — report as failure (workflow fails)
#
# Default policy (not listed here): all HIGH-severity rules FAIL.
# Run `docker run --rm owasp/zap2docker-stable zap-full-scan.py --help`
# to see the full list of passive/active rule IDs.
#
# Rationale for each override is noted inline.
# Keep this file minimal — prefer fixing the root cause over ignoring alerts.
# When adding an allowlist entry, document the justification in the commit message.
#
# Reference: https://www.zaproxy.org/docs/alerts/

# --- IGNORE ---
# 10202: Anti-CSRF Tokens Check
#   Stateless REST API endpoints (Odoo JSON-RPC, Ghost Content API) do not use
#   HTML forms and therefore do not require CSRF tokens. Session-based routes
#   inside Odoo have their own CSRF handling.
10202	IGNORE

# 10015: Incomplete or No Cache-control Header Set
#   Odoo dynamically sets cache-control; ZAP often flags static assets
#   that are intentionally cached. Suppress to reduce noise.
10015	IGNORE

# --- WARN (report but do not fail the build) ---
# 10038: Content Security Policy (CSP) Header Not Set
#   CSP is configured in nginx. Subdomains serving only API JSON (no HTML)
#   may legitimately omit CSP. Warn until full coverage is confirmed.
10038	WARN

# 10020: X-Frame-Options Header
#   Odoo sets this on HTML pages; API endpoints may not. Warn to track coverage.
10020	WARN

# 10036: Server Leaks Version Information via "Server" HTTP Response Header Field
#   Informational; nginx version is already suppressed in production config.
#   Keep as WARN to catch regressions.
10036	WARN

# 10021: X-Content-Type-Options Header Missing
#   Nginx sets nosniff; sandbox may differ from production. Warn only.
10021	WARN

# --- FAIL (high-severity rules — explicit for clarity) ---
# 40018: SQL Injection
40018	FAIL
# 40012: Cross Site Scripting (Reflected)
40012	FAIL
# 40014: Cross Site Scripting (Persistent)
40014	FAIL
# 90019: Server Side Include
90019	FAIL
# 6: Path Traversal
6	FAIL
# 7: Remote File Inclusion
7	FAIL
# 40016: Cross Site Scripting (Persistent) — Prime
40016	FAIL
# 40017: Cross Site Scripting (Persistent) — Spider
40017	FAIL
