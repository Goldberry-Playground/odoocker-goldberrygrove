# ─────────────────────────────────────────────────────────────────────────────
# Grove Ghost CMS — Nginx upstream & proxy configuration
# Include this file from the main nginx config or mount alongside default.conf
# ─────────────────────────────────────────────────────────────────────────────

upstream ghost_goldberry {
    server ghost-goldberry:2368;
}

upstream ghost_ggg {
    server ghost-ggg:2369;
}

upstream ghost_nursery {
    server ghost-nursery:2370;
}

# ── Goldberry Grove Farm blog ────────────────────────────────────────────────
server {
    listen 80;
    server_name blog.goldberrygrove.farm;

    client_max_body_size 50m;

    # Security headers (Ghost serves user-visible HTML, so MIME-sniff +
    # clickjacking protection matter here unlike on the JSON API tier).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://ghost_goldberry;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /blog-api/goldberry/ {
        proxy_pass http://ghost_goldberry/ghost/api/;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

