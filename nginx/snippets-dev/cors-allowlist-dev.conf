# Dev-only CORS origins — localhost storefront ports.
#
# This file is INTENTIONALLY NOT mounted into the container in production.
# docker-compose.override.local.yml is the only compose overlay that
# binds this path into /etc/nginx/snippets/cors-allowlist-dev.conf on
# both the inner nginx and the outer nginx-proxy. In prod the file
# simply doesn't exist inside the container and the
# `include .../cors-allowlist-dev*.conf;` glob in cors-allowlist.conf
# matches zero files (nginx silently allows empty globs).
#
# Why this matters: in phase-1 these localhost origins shipped in the
# prod allowlist. A user authenticated to https://erp.gatheringatthegrove.com
# who also opened any local-bound web app on http://localhost:3000-3003
# could issue credentialed cross-origin requests to ERP — the prod
# response would echo back Access-Control-Allow-Origin: http://localhost:3001
# and Allow-Credentials: true. Splitting the allowlist by environment
# closes that hole.
#
# Format: key/value pairs only. This file is `include`d INSIDE the
# `map { }` block in cors-allowlist.conf, so do NOT wrap these lines in
# another `map` directive or any block.
"http://localhost:3000"               $http_origin;
"http://localhost:3001"               $http_origin;
"http://localhost:3002"               $http_origin;
"http://localhost:3003"               $http_origin;
