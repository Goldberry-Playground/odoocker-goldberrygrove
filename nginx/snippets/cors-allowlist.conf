# CORS allowlist — single source of truth.
#
# Each $http_origin is mapped to itself if-and-only-if it matches one of
# our known storefront / hub origins. Disallowed origins resolve to an
# empty string and the `add_header` inside the `if ($cors_allow_origin)`
# gate in each location is skipped entirely — no
# `Access-Control-Allow-Origin: *` and no echoing of a client-controlled
# header.
#
# Compile-time list, not runtime header echo. The previous design read
# `X-Cors-Allowed-Domain` from the request and echoed it back combined
# with `Allow-Credentials: true`, which let any cross-origin attacker
# exfiltrate authenticated Odoo responses.
#
# CONTEXT REQUIREMENT: this file declares a `map` directive, which is
# only valid inside `http {}`. It must be included from a place that's
# already at http context — i.e. from `nginx.conf` directly, or from a
# file pulled in by `include /etc/nginx/conf.d/*.conf;` at http scope.
# Never include this from inside `server {}` or `location {}`.
#
# DEV ORIGINS: localhost storefront ports are NOT listed here. They live
# in `cors-allowlist-dev.conf`, mounted into the container only by the
# local dev overlay (see docker-compose.override.local.yml). Prod images
# never see the dev file, so production responses cannot echo
# Access-Control-Allow-Origin for any http://localhost:* request even if
# a developer's browser happens to be authenticated to an erp.* domain.
#
# Both the inner Odoo nginx (nginx/) and the outer nginx-proxy include
# this same file via /etc/nginx/snippets/cors-allowlist.conf — the
# docker-compose mounts wire both tiers to the same bytes on disk.
map $http_origin $cors_allow_origin {
    default "";

    # ── Production origins ────────────────────────────────────────────
    "https://goldberrygrove.farm"         $http_origin;
    "https://www.goldberrygrove.farm"     $http_origin;
    "https://woodworkingeorge.com"        $http_origin;
    "https://www.woodworkingeorge.com"    $http_origin;
    "https://atthegrovenursery.com"       $http_origin;
    "https://www.atthegrovenursery.com"   $http_origin;
    "https://gatheringatthegrove.com"     $http_origin;
    "https://www.gatheringatthegrove.com" $http_origin;

    # ── Dev origins (loaded only in local mode) ───────────────────────
    # In prod the file below is not mounted; nginx silently skips
    # unmatched include globs, so the production allowlist contains
    # ONLY the entries above.
    include /etc/nginx/snippets/cors-allowlist-dev*.conf;
}
