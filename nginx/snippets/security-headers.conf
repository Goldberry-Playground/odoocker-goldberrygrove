# Shared security headers — `include` from any location/server block.
#
# These three headers are added on every storefront-facing response.
# CSP is intentionally omitted because Odoo's templates and Ghost themes
# both inline scripts/styles aggressively; a stand-alone CSP needs a
# dedicated audit and is tracked as a follow-up.
#
# WHY THIS FILE EXISTS — nginx's `add_header` semantics:
#   A location that emits its own `add_header` SHADOWS every server-level
#   add_header — none of the parent headers propagate down. So a location
#   that needs to add CORS headers, for example, must restate every
#   security header it wants to keep, or those headers silently drop off
#   responses served from that location.
#
#   Before this snippet existed, the X-Content-Type-Options /
#   X-Frame-Options / Referrer-Policy triplet was copy-pasted four times
#   across nginx/default.conf and nginx/grove-ghost.conf. Any new
#   location that emitted an add_header would silently lose the
#   security triplet, and a reviewer wouldn't notice until a header diff.
#
# Use:
#   server { include /etc/nginx/snippets/security-headers.conf; ... }
#   location /xyz { include /etc/nginx/snippets/security-headers.conf; ... }
#
# A location that does NOT emit its own add_header doesn't need to
# include this — the server-level include's headers will inherit
# normally. Including unnecessarily is still safe; nginx de-dupes
# identical add_header lines at the same context.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
