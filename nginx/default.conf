# Allows the usage of $CORS_ALLOWED_DOMAIN
map $http_x_cors_allowed_domain $CORS_ALLOWED_DOMAIN {
    default "*";
}

server {
    client_max_body_size 2048m;

    proxy_connect_timeout 900;
    proxy_send_timeout 900;
    proxy_read_timeout 900;
    send_timeout 900;

    listen [::]:80;
    listen 80;

    # Catch-all: nginx-proxy has already routed the correct domain to this container.
    # Odoo's multi-website module selects the right Website based on $host internally.
    server_name _;

    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/html;
    }

    location / {
        proxy_pass http://odoo:8069;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add CORS headers
        add_header 'Access-Control-Allow-Origin' $CORS_ALLOWED_DOMAIN;
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    location /websocket {
        proxy_pass http://odoo:8072;
        proxy_redirect off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GitHub webhook endpoint for live custom-module sync.
    # Configure a GitHub webhook on your modules repo:
    #   Payload URL : https://your-domain/modules-sync/
    #   Content type: application/json
    #   Event       : Push
    #
    # SECURITY: nginx cannot verify the GitHub webhook signature (X-Hub-Signature-256).
    # Mitigate with one or both of:
    #   1. Restrict to GitHub's webhook IP ranges in your DO firewall
    #      (see https://api.github.com/meta for current ranges).
    #   2. Place a small signature-checking proxy (e.g. a Cloudflare Worker or smee.io relay)
    #      in front of this endpoint that validates the secret before forwarding.
    location /modules-sync/ {
        proxy_pass http://custom-modules-sync:9000/;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        limit_except POST { deny all; }
    }
}
