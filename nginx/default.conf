# CORS allowlist.
#
# Each $http_origin is mapped to itself if-and-only-if it matches one of
# our known storefront / hub / dev origins. Disallowed origins resolve to
# an empty string and the `add_header` inside the conditional below is
# skipped entirely — no `Access-Control-Allow-Origin: *` and no echoing
# of a client-controlled header.
#
# Compile-time list, not runtime header echo. The previous design read
# `X-Cors-Allowed-Domain` from the request and echoed it back combined
# with `Allow-Credentials: true`, which let any cross-origin attacker
# exfiltrate authenticated Odoo responses.
map $http_origin $cors_allow_origin {
    default "";
    "https://goldberrygrove.farm"        $http_origin;
    "https://www.goldberrygrove.farm"    $http_origin;
    "https://woodworkingeorge.com"       $http_origin;
    "https://www.woodworkingeorge.com"   $http_origin;
    "https://atthegrovenursery.com"      $http_origin;
    "https://www.atthegrovenursery.com"  $http_origin;
    "https://gatheringatthegrove.com"    $http_origin;
    "https://www.gatheringatthegrove.com" $http_origin;
    # Local dev: each storefront has its own port (see grove-sites/apps/*/package.json).
    "http://localhost:3000"              $http_origin;
    "http://localhost:3001"              $http_origin;
    "http://localhost:3002"              $http_origin;
    "http://localhost:3003"              $http_origin;
}

server {
    client_max_body_size 2048m;

    proxy_connect_timeout 900;
    proxy_send_timeout 900;
    proxy_read_timeout 900;
    send_timeout 900;

    listen [::]:80;
    listen 80;

    # Catch-all: nginx-proxy has already routed the correct domain to this container.
    # Odoo's multi-website module selects the right Website based on $host internally.
    server_name _;

    # ── Security headers ────────────────────────────────────────────────
    # Applied on every response. CSP is intentionally omitted here because
    # Odoo's templates inline scripts/styles aggressively; a stand-alone
    # CSP needs a dedicated audit and is tracked as a follow-up.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Block the Odoo database manager ─────────────────────────────────
    # Full DB takeover surface (create/drop/restore + master-password
    # prompt). `list` is included because `LIST_DB=True` defaults to
    # enumerating DB names — the gate here is defense in depth even when
    # an operator forgets to flip `list_db = False` in odoo.conf.
    # 404 (not 403) hides existence from probes.
    location ~ ^/web/database/(manager|selector|list|create|drop|backup|restore|duplicate|change_password) {
        return 404;
    }

    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/html;
    }

    location / {
        proxy_pass http://odoo:8069;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers — repeated here because nginx's add_header
        # directive in a location shadows server-level add_header. Any
        # location that emits its own add_header (the CORS conditionals
        # below) loses the server-block versions unless they're restated.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # `Vary: Origin` is emitted unconditionally (outside any `if`) so
        # shared caches won't serve a no-CORS response to a subsequent
        # request from an allowed origin — cache poisoning defense.
        add_header 'Vary' 'Origin' always;

        # CORS: only emit Allow-Origin / Allow-Credentials when the request
        # origin is in the allowlist above. Browsers treat a missing
        # Allow-Origin as deny, which is exactly what we want for any
        # origin we haven't approved.
        if ($cors_allow_origin) {
            add_header 'Access-Control-Allow-Origin' $cors_allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            add_header 'Vary' 'Origin' always;
        }

        # OPTIONS preflight: nginx treats each `if` block as its own
        # implicit nested location, so the CORS add_headers inside the
        # `if ($cors_allow_origin)` block above do NOT propagate here.
        # The headers MUST be restated for preflight responses or
        # browsers reject every cross-origin storefront request.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Vary' 'Origin' always;
            return 204;
        }
    }

    location /websocket {
        proxy_pass http://odoo:8072;
        proxy_redirect off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GitHub webhook endpoint for live custom-module sync.
    # Configure a GitHub webhook on your modules repo:
    #   Payload URL : https://your-domain/modules-sync/
    #   Content type: application/json
    #   Event       : Push
    #
    # SECURITY: nginx cannot verify the GitHub webhook signature (X-Hub-Signature-256).
    # Mitigate with one or both of:
    #   1. Restrict to GitHub's webhook IP ranges in your DO firewall
    #      (see https://api.github.com/meta for current ranges).
    #   2. Place a small signature-checking proxy (e.g. a Cloudflare Worker or smee.io relay)
    #      in front of this endpoint that validates the secret before forwarding.
    location /modules-sync/ {
        proxy_pass http://custom-modules-sync:9000/;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        limit_except POST { deny all; }
    }
}
